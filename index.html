// ─── COCKTAIL DATABASE ────────────────────────────────────────────────────────
const DB = [  {id:1,name:"Amaretto & Coke",emoji:"🍑",base:"liqueur",tags:["sweet","simple","approachable","light","nutty"],ings:["Amaretto","Cola"],parts:["2 shots Amaretto","4 shots Cola"],method:"Build in a highball over ice. Stir gently. Cherry garnish.",flavor:"Sweet almond, caramel cola — easy and crowd-friendly.",note:"Underrated. The almond sweetness plays surprisingly well with cola's bitterness."},
  {id:2,name:"Amaretto Sour",emoji:"🍑",base:"liqueur",tags:["sweet","citrus","tart","nutty","approachable"],ings:["Amaretto","Lemon Juice","Simple Syrup","Angostura Bitters"],parts:["2 shots Amaretto",".75 shot Lemon Juice",".25 shot Simple Syrup","2 dashes Angostura Bitters"],method:"Shake with ice. Strain over a large ice cube. Cherry and orange peel garnish.",flavor:"Sweet almond, tart citrus, warm finish with bitters complexity.",note:"The bitters are non-negotiable — they cut sweetness and make this a real cocktail."},
  {id:3,name:"Americano",emoji:"🇮🇹",base:"aperitivo",tags:["bitter","bubbly","herbal","light","low-abv"],ings:["Campari","Sweet Vermouth","Club Soda"],parts:["1 shot Campari","1 shot Sweet Vermouth","2–3 shots Club Soda"],method:"Build in a rocks glass over ice. Stir. Orange peel garnish.",flavor:"Bitter, herbal, lightly sweet, refreshingly bubbly.",note:"The predecessor to the Negroni. James Bond's first-ever drink order."},
  {id:4,name:"Aperol Negroni",emoji:"🧡",base:"gin",tags:["bitter","herbal","citrus","light","approachable"],ings:["Gin","Sweet Vermouth","Aperol"],parts:["1 shot Gin","1 shot Sweet Vermouth","1 shot Aperol"],method:"Stir over ice. Strain over large cube. Orange peel garnish.",flavor:"Lighter and more citrus-forward than a classic Negroni — same structure, softer bitterness.",note:"Aperol swapped for Campari makes this more approachable. A great gateway Negroni."},
  {id:5,name:"Aperol Paloma",emoji:"🧡",base:"tequila",tags:["bitter","citrus","grapefruit","bubbly","refreshing"],ings:["Tequila (Blanco)","Aperol","Lime Juice","Grapefruit Juice","Simple Syrup","Club Soda"],parts:["2 shots Tequila (Blanco)","1 shot Aperol",".5 shot Lime Juice",".5 shot Grapefruit Juice",".25 shot Simple Syrup","2 shots Club Soda"],method:"Tajín-salt rim. Shake tequila, Aperol, lime, grapefruit, syrup with ice. Strain over fresh ice. Top with club soda.",flavor:"Bittersweet orange, tart grapefruit, agave backbone, lightly spiced rim.",note:"Aperol bridges tequila and grapefruit beautifully."},
  {id:6,name:"Aperol Sour",emoji:"🍊",base:"aperitivo",tags:["bitter","citrus","tart","light","refreshing"],ings:["Aperol","Lemon Juice","Simple Syrup","Egg White"],parts:["2 shots Aperol",".75 shot Lemon Juice",".5 shot Simple Syrup",".5 Egg White"],method:"Dry shake. Add ice, shake hard. Strain into a rocks glass over ice. Express orange peel on top.",flavor:"Bittersweet orange, tart citrus, silky foam — bright and elegant.",note:"Aperol's natural acidity makes it one of the best bases for a sour. Don't skip the egg white."},
  {id:7,name:"Aperol Spritz",emoji:"🧡",base:"aperitivo",tags:["light","bubbly","bitter","citrus","low-abv","refreshing"],ings:["Aperol","Club Soda"],parts:["2 shots Aperol","3 shots Club Soda"],method:"Fill a large wine glass with ice. Add Aperol, then club soda. Stir gently. Orange slice garnish.",flavor:"Light, bittersweet orange, effervescent and refreshing.",note:"Traditionally Prosecco. Club soda works well. Endlessly sessionable."},
  {id:8,name:"Arnold Palmer",emoji:"⛳",base:"liqueur",tags:["citrus","light","refreshing","simple","non-alcoholic"],ings:["Lemon Juice","Simple Syrup","Club Soda"],parts:["2 shots Lemon Juice",".5 shot Simple Syrup","4 shots Club Soda or Iced Tea"],method:"Combine lemon juice and syrup in a tall glass. Fill with ice. Top with iced tea or club soda. Stir. Lemon wheel garnish.",flavor:"Tart lemon, tea earthiness — the most refreshing non-alcoholic option at any bar.",note:"Half lemonade, half iced tea. Named after the golfer who drank it constantly. Add vodka and it becomes a John Daly. The John Daly is also acceptable."},

  {id:9,name:"Aruba Ariba",emoji:"🏝️",base:"rum",tags:["tropical","fruity","sweet","citrus","light","approachable"],ings:["Rum (White)","Rum (Dark)","Banana Liqueur","Triple Sec","Orange Juice","Grenadine"],parts:["1 shot Rum (White)","1 shot Rum (Dark)",".5 shot Banana Liqueur",".5 shot Triple Sec","2 shots Orange Juice","splash Grenadine"],method:"Shake all ingredients with ice. Pour over fresh ice in a tall glass. Fruit garnish.",flavor:"Tropical, fruity, layered rum with citrus brightness and a hint of banana.",note:"The house tropical build. Every ingredient pulls its weight."},
  {id:10,name:"Aviation",emoji:"✈️",base:"gin",tags:["floral","citrus","tart","elegant","classic","herbal"],ings:["Gin","Maraschino Liqueur","Crème de Violette","Lemon Juice"],parts:["1.5 shots Gin",".5 shot Maraschino Liqueur",".25 shot Crème de Violette",".75 shot Lemon Juice"],method:"Shake all ingredients with ice. Double strain into a chilled coupe. Cherry garnish.",flavor:"Floral violet, botanical gin, cherry-almond, bright lemon — turns a pale sky blue in the glass.",note:"The Crème de Violette is the soul of this drink — it gives the violet color and floral note. Without it, it's just a gimlet variation. With it, it's something special."},
  {id:11,name:"B-52",emoji:"💣",base:"liqueur",tags:["coffee","creamy","sweet","layered","dessert"],ings:["Kahlúa","Baileys Irish Cream","Grand Marnier"],parts:["⅓ shot Kahlúa","⅓ shot Baileys Irish Cream","⅓ shot Grand Marnier"],method:"Layer carefully in a shot glass: Kahlúa first, then Baileys floated over a spoon, then Grand Marnier. Do not mix.",flavor:"Coffee, creamy Irish cream, orange — each layer in sequence.",note:"The layering is the whole point. Drink it as a shot to get all three at once."},
  {id:12,name:"Banana Daiquiri",emoji:"🍌",base:"rum",tags:["tropical","sweet","fruity","citrus","light"],ings:["Rum (White)","Banana Liqueur","Lime Juice"],parts:["1.5 shots Rum (White)","1 shot Banana Liqueur",".5 shot Lime Juice"],method:"Shake hard with ice. Strain into a chilled coupe. Small lime wheel garnish.",flavor:"Tropical, fruity, bright with citrus balance.",note:"Sounds like a pool drink. Tastes surprisingly sophisticated."},
  {id:13,name:"Batanga",emoji:"🫙",base:"tequila",tags:["citrus","bubbly","sweet","simple","refreshing"],ings:["Tequila (Blanco)","Cola","Lime Juice","Salt"],parts:["2 shots Tequila (Blanco)","4 shots Cola",".5 shot Lime Juice","Salt rim"],method:"Salt the rim of a highball. Fill with ice. Add tequila and lime. Top with cola. Stir with the salted knife if you're being authentic.",flavor:"Tequila agave, cola sweetness, lime brightness, salty edge — surprisingly good.",note:"Don Javier Delgado Corona invented this at La Capilla in Tequila, Mexico. He stirs it with a large knife. The salt rim against the cola sweetness is the magic move. Underrated everywhere outside Mexico."},

  // ── RUM ADDITIONS ────────────────────────────────────────────────────────────
  {id:14,name:"Bay Breeze",emoji:"🌊",base:"vodka",tags:["fruity","tropical","light","sweet","refreshing"],ings:["Vodka","Cranberry Juice","Pineapple Juice"],parts:["2 shots Vodka","2 shots Cranberry Juice","2 shots Pineapple Juice"],method:"Build in a highball over ice. Stir gently. Pineapple wedge garnish.",flavor:"Tropical pineapple, tart cranberry, clean vodka — fruity and breezy.",note:"Cape Codder plus pineapple. The pineapple softens the cranberry's tartness and adds a tropical sweetness that makes this more layered than it looks."},
  {id:15,name:"Bee's Knees",emoji:"🐝",base:"gin",tags:["citrus","sweet","herbal","light","refreshing","classic"],ings:["Gin","Lemon Juice","Honey Syrup"],parts:["2 shots Gin",".75 shot Lemon Juice",".75 shot Honey Syrup"],method:"Shake with ice. Double strain into a chilled coupe. Lemon twist garnish.",flavor:"Honey sweetness, bright lemon, botanical gin — perfectly balanced.",note:"Prohibition-era classic. The honey masked bathtub gin. Works better with good gin."},
  {id:16,name:"Bellini",emoji:"🍑",base:"liqueur",tags:["fruity","bubbly","sweet","light","elegant","brunch"],ings:["Peach Schnapps","Club Soda"],parts:[".75 shot Peach Schnapps","4 shots Club Soda or Champagne"],method:"Pour cold peach schnapps into a champagne flute. Top slowly with cold Champagne or club soda. Stir once gently.",flavor:"Fresh peach sweetness, effervescent — delicate and elegant.",note:"Harry's Bar, Venice, 1948. Originally made with white peach purée. Peach schnapps captures the same note. The drink should be peach-forward but not syrupy."},
  {id:17,name:"Between the Sheets",emoji:"🛏️",base:"brandy",tags:["citrus","tart","complex","spirit-forward","classic"],ings:["Brandy","Rum (White)","Triple Sec","Lemon Juice"],parts:[".75 shot Brandy",".75 shot Rum (White)",".75 shot Triple Sec",".75 shot Lemon Juice"],method:"Shake all ingredients with ice. Strain into a chilled coupe. Lemon twist garnish.",flavor:"Equal parts complexity — brandy depth, rum sweetness, orange citrus, tart lemon.",note:"Equal parts sibling to the Sidecar and Daiquiri. Named in the Prohibition era for reasons that don't need explaining."},
  {id:18,name:"Bicicletta",emoji:"🚲",base:"aperitivo",tags:["bitter","bubbly","light","low-abv","refreshing","herbal"],ings:["Campari","Dry Vermouth","Club Soda"],parts:["1.5 shots Campari","1.5 shots Dry Vermouth","3 shots Club Soda"],method:"Fill a wine glass or highball with ice. Add Campari and dry vermouth. Top with club soda. Lemon twist garnish.",flavor:"Dry bitter Campari, herbal vermouth, effervescent — lower ABV and completely refreshing.",note:"Italian cycling term — the wobble of someone who's had a few. Campari plus dry vermouth is drier and more complex than the Spritz format. A thinking drinker's aperitivo."},

  // ── LOW ABV / MOCKTAILS ──────────────────────────────────────────────────────
  {id:19,name:"Black Manhattan",emoji:"🖤",base:"whiskey",tags:["herbal","sweet","complex","spirit-forward","bitter","warming"],ings:["Bourbon","Campari","Angostura Bitters"],parts:["2 shots Bourbon","1 shot Campari","2 dashes Angostura Bitters"],method:"Stir with ice for 30 seconds. Strain into a chilled coupe. Cherry garnish.",flavor:"Bourbon warmth, bitter Campari replacing vermouth — darker, more complex, and bolder than a classic Manhattan.",note:"Campari instead of sweet vermouth makes this more bitter and less sweet. A Manhattan for people who think the original isn't complex enough. The cherry garnish cuts the bitterness beautifully."},
  {id:20,name:"Black Russian",emoji:"🖤",base:"vodka",tags:["coffee","sweet","simple","spirit-forward"],ings:["Vodka","Kahlúa"],parts:["2 shots Vodka","1 shot Kahlúa"],method:"Fill a rocks glass with ice. Add vodka, then Kahlúa. Stir briefly.",flavor:"Clean spirit, coffee sweetness — direct and unfussy.",note:"Add Baileys → White Russian. Add cola → Colorado Bulldog."},
  {id:21,name:"Blackberry Brandy Sour",emoji:"🫐",base:"liqueur",tags:["fruity","tart","citrus","sweet","approachable"],ings:["Blackberry Brandy","Lemon Juice","Simple Syrup"],parts:["2 shots Blackberry Brandy","1 shot Lemon Juice",".5 shot Simple Syrup"],method:"Shake hard with ice. Strain into rocks glass over fresh ice. Cherry garnish.",flavor:"Rich dark berry, proper acid balance, bright citrus lift.",note:"Rich fruit, proper acid balance. The lemon keeps it from being cloying. A house original."},
  {id:22,name:"Blackberry Collins",emoji:"🫐",base:"gin",tags:["fruity","citrus","bubbly","light","refreshing"],ings:["Gin","Lemon Juice","Simple Syrup","Blackberry Brandy","Club Soda"],parts:["2 shots Gin",".75 shot Lemon Juice",".5 shot Simple Syrup",".5 shot Blackberry Brandy","2 shots Club Soda"],method:"Shake gin, lemon, syrup, and blackberry brandy with ice. Strain into a highball over ice. Top with club soda. Berry garnish.",flavor:"Bright lemon, berry sweetness, botanical gin, effervescent.",note:"A Tom Collins dressed for a night out. The blackberry brandy transforms the whole drink."},
  // VODKA
  {id:23,name:"Blackberry Sunset",emoji:"🌆",base:"liqueur",tags:["fruity","sweet","citrus","light","approachable"],ings:["Blackberry Brandy","Licor 43","Orange Juice","Grenadine"],parts:["1 shot Blackberry Brandy","1 shot Licor 43","3 shots Orange Juice","splash Grenadine"],method:"Build over ice in a tall glass. Add spirits and OJ. Slowly pour grenadine down the side for the sunset layer.",flavor:"Dark berry, vanilla-citrus, bright orange, with a grenadine blush.",note:"A house original. The Blackberry Brandy adds depth and color to the sunset formula."},
  {id:24,name:"Blood & Sand",emoji:"🩸",base:"whiskey",tags:["fruity","citrus","herbal","complex","classic","spirit-forward"],ings:["Scotch","Sweet Vermouth","Triple Sec","Orange Juice"],parts:[".75 shot Scotch",".75 shot Sweet Vermouth",".75 shot Triple Sec",".75 shot Orange Juice"],method:"Shake all equal parts with ice. Double strain into a chilled coupe. Orange twist garnish.",flavor:"Smoky, sweet orange, herbal vermouth — unusual on paper and completely cohesive in the glass.",note:"Named after a 1922 Valentino bullfighting film. Equal parts everything. One of the rare cocktails where OJ works in a stirred-style drink."},
  {id:25,name:"Bloody Mary",emoji:"🍅",base:"vodka",tags:["savory","spicy","complex","brunch","bold"],ings:["Vodka","Tomato Juice","Lemon Juice","Worcestershire Sauce","Hot Sauce","Horseradish","Salt","Black Pepper","Celery"],parts:["2 shots Vodka","4 shots Tomato Juice",".5 shot Lemon Juice","3 dashes Worcestershire Sauce","3 dashes Hot Sauce","1 tsp Horseradish","pinch Salt and Black Pepper"],method:"Combine all ingredients and roll between shaker and glass rather than shake. Pour over ice. Celery stalk and garnish heavily.",flavor:"Savory, spicy, rich tomato with a briny backbone.",note:"The Bloody Mary is a philosophy. Adjust every element until it's yours."},
  // TEQUILA
  {id:26,name:"Boulevardier",emoji:"🍊",base:"whiskey",tags:["bitter","spirit-forward","warming","herbal","rich"],ings:["Bourbon","Sweet Vermouth","Campari"],parts:["1.5 shots Bourbon",".75 shot Sweet Vermouth",".75 shot Campari"],method:"Stir with ice until well chilled. Strain over large cube. Express orange peel.",flavor:"Warm, rich, bittersweet — a Negroni with a Southern accent.",note:"If you love Negronis, this is the next logical step. Bourbon softens the bitterness."},
  {id:27,name:"Bramble",emoji:"🫐",base:"gin",tags:["fruity","tart","citrus","herbal","sweet"],ings:["Gin","Lemon Juice","Simple Syrup","Blackberry Brandy"],parts:["2 shots Gin",".75 shot Lemon Juice",".5 shot Simple Syrup",".5 shot Blackberry Brandy (float)"],method:"Shake gin, lemon, syrup with ice. Strain into crushed-ice-filled rocks glass. Drizzle blackberry brandy slowly on top.",flavor:"Bright citrus, floral gin, dark berry sweetness in layers.",note:"The float creates a gradient that bleeds through as you drink. Don't rush it."},
  {id:28,name:"Brandy Alexander",emoji:"🍫",base:"brandy",tags:["creamy","sweet","rich","dessert","classic","warming"],ings:["Brandy","Crème de Cacao (Dark)","Heavy Cream"],parts:["1.5 shots Brandy","1 shot Crème de Cacao (Dark)","1 shot Heavy Cream"],method:"Shake all ingredients hard with ice. Double strain into a chilled coupe. Freshly grated nutmeg on top.",flavor:"Rich brandy, chocolate cream, nutmeg warmth — liquid dessert.",note:"Pre-Prohibition era classic. The nutmeg is mandatory — it's what separates a Brandy Alexander from just cream and chocolate. Shake very hard for the silkiest texture."},
  {id:29,name:"Brandy Crusta",emoji:"🍊",base:"brandy",tags:["citrus","complex","elegant","classic","tart"],ings:["Brandy","Triple Sec","Lemon Juice","Maraschino Liqueur","Angostura Bitters"],parts:["1.5 shots Brandy",".5 shot Triple Sec",".75 shot Lemon Juice",".25 shot Maraschino Liqueur","1 dash Angostura Bitters"],method:"Sugar rim the glass. Place a long spiral of lemon peel inside the glass. Shake all ingredients with ice. Strain into the prepared glass.",flavor:"Brandy depth, citrus brightness, orange sweetness, maraschino complexity — a Sidecar with ceremony.",note:"New Orleans, 1850s. One of the oldest cocktails in the canon. The long spiral of lemon peel inside the glass is the signature move — it both garnishes and adds aromatics. The original template for dozens of cocktails that followed."},

  // ── CHAMPAGNE / BUBBLY ───────────────────────────────────────────────────────
  {id:30,name:"Brown Derby",emoji:"🏇",base:"whiskey",tags:["citrus","sweet","tart","warming","classic"],ings:["Bourbon","Grapefruit Juice","Honey Syrup"],parts:["2 shots Bourbon","1 shot Grapefruit Juice",".5 shot Honey Syrup"],method:"Shake all ingredients with ice. Strain into a chilled coupe. Grapefruit twist garnish.",flavor:"Bourbon warmth, tart grapefruit, honey sweetness — a Gold Rush with a citrus edge.",note:"Hollywood classic from the 1930s. Grapefruit instead of lemon makes this drier and more complex. The honey is essential — simple syrup flattens it."},
  {id:31,name:"Cable Car",emoji:"🚠",base:"rum",tags:["citrus","sweet","tart","spiced","light","refreshing"],ings:["Rum (Spiced)","Triple Sec","Lemon Juice","Simple Syrup"],parts:["1.5 shots Rum (Spiced)",".75 shot Triple Sec",".75 shot Lemon Juice",".25 shot Simple Syrup"],method:"Sugar or cinnamon-sugar rim optional. Shake all ingredients with ice. Strain into a chilled coupe. Lemon twist garnish.",flavor:"Warm spiced rum, orange, tart lemon — a spiced Sidecar.",note:"San Francisco original. Spiced rum was made for this formula. The cinnamon-sugar rim is optional but beautiful. A Sidecar that took a tropical detour."},
  {id:32,name:"Cape Codder",emoji:"🦞",base:"vodka",tags:["fruity","citrus","light","simple","refreshing"],ings:["Vodka","Cranberry Juice","Lime Juice"],parts:["2 shots Vodka","4 shots Cranberry Juice",".5 shot Lime Juice"],method:"Build in a highball over ice. Stir. Lime wedge garnish.",flavor:"Clean vodka, tart cranberry, bright lime — simple, honest, endlessly drinkable.",note:"The Cape Cod. Vodka cranberry grown up slightly with lime. Ocean Spray's signature cocktail from the 1940s. Add pineapple juice and it becomes a Bay Breeze."},
  {id:33,name:"Carajillo",emoji:"🤎",base:"liqueur",tags:["coffee","sweet","warming","simple","rich"],ings:["Licor 43","Espresso"],parts:["2 shots Licor 43","1 shot Espresso (cooled slightly)"],method:"Pour Licor 43 over ice in a rocks glass. Add espresso. Stir gently.",flavor:"Vanilla-citrus liqueur meets bold espresso — sweet, aromatic, and warming.",note:"A Spanish staple. Licor 43 is the only correct base. Fresh espresso makes or breaks it."},
  {id:34,name:"Champagne Cocktail",emoji:"🥂",base:"liqueur",tags:["bubbly","sweet","herbal","elegant","classic","low-abv"],ings:["Angostura Bitters","Simple Syrup","Club Soda"],parts:["1 Sugar cube soaked in Angostura Bitters","4 shots Club Soda or Champagne",".25 shot Simple Syrup"],method:"Place a sugar cube soaked in Angostura bitters in the bottom of a champagne flute. Add a small pour of brandy if desired. Top slowly with cold Champagne or club soda. Don't stir.",flavor:"Effervescent, aromatic bitters threading up through bubbles — simple, ceremonial, and elegant.",note:"The original cocktail, circa 1860s. The sugar cube slowly dissolves, changing the drink as you consume it. Watch the bitters spiral up through the bubbles. Some things don't need improving."},
  {id:35,name:"Cinnamon Coconut Old Fashioned",emoji:"🥥",base:"whiskey",tags:["sweet","warming","tropical","spiced","spirit-forward","rich"],ings:["Bourbon","Cinnamon Syrup","Coconut Water","Orange Bitters"],parts:["2 shots Bourbon",".5 shot Cinnamon Syrup","splash Coconut Water","2 dashes Orange Bitters"],method:"Stir over ice in a rocks glass. Add a large cube. Express orange peel over the top.",flavor:"Bourbon warmth, cinnamon spice, subtle coconut sweetness, citrus aromatics.",note:"A house original Old Fashioned riff. The coconut water adds a subtle tropical note without being obvious about it."},
  // GIN
  {id:36,name:"Clover Club",emoji:"🩷",base:"gin",tags:["fruity","tart","herbal","light","citrus","classic"],ings:["Gin","Lemon Juice","Simple Syrup","Grenadine","Egg White"],parts:["2 shots Gin",".5 shot Lemon Juice",".5 shot Simple Syrup",".25 shot Grenadine",".5 Egg White"],method:"Dry shake all ingredients without ice first. Add ice, shake again hard. Double strain into a chilled coupe.",flavor:"Floral, tart, light raspberry-lemon with gin botanicals and a silky foam.",note:"Pre-Prohibition classic. Looks like a novelty. Is not. The egg white foam is the whole point."},
  {id:37,name:"Corey's Twist Boulevardier",emoji:"🍊",base:"whiskey",tags:["bitter","spirit-forward","warming","herbal","citrus","complex"],ings:["Bourbon","Sweet Vermouth","Campari","Triple Sec","Orange Bitters"],parts:["1.5 shots Bourbon",".75 shot Sweet Vermouth",".5 shot Campari",".25 shot Triple Sec","1 dash Orange Bitters"],method:"Stir with ice until well chilled. Strain over large cube. Orange twist garnish.",flavor:"Classic Boulevardier brightened by Triple Sec and orange bitters — more citrus, less bitter.",note:"The Triple Sec softens the Campari edge and adds citrus brightness the original lacks. A house variation."},
  {id:38,name:"Corpse Reviver #2",emoji:"💀",base:"gin",tags:["citrus","herbal","complex","tart","classic","dry"],ings:["Gin","Triple Sec","Lillet Blanc","Lemon Juice"],parts:[".75 shot Gin",".75 shot Triple Sec",".75 shot Lillet Blanc",".75 shot Lemon Juice"],method:"Rinse a chilled coupe with absinthe if available. Shake all ingredients with ice. Double strain into the rinsed coupe.",flavor:"Bright citrus, herbal gin, wine-floral Lillet, orange — clean and restorative.",note:"Designed as a morning-after cure. Equal parts, all four. The absinthe rinse is optional but adds an anise whisper that lifts everything. Have two, they warned, and you'll need a third."},
  {id:39,name:"Cosmopolitan",emoji:"🌸",base:"vodka",tags:["citrus","fruity","tart","light","approachable"],ings:["Vodka","Triple Sec","Cranberry Juice","Lime Juice"],parts:["1.5 shots Vodka",".75 shot Triple Sec","1 shot Cranberry Juice",".5 shot Lime Juice"],method:"Shake well. Strain into chilled martini glass. Lime zest garnish.",flavor:"Tart citrus, light cranberry, clean and balanced.",note:"Unfairly stigmatized. A well-balanced cocktail. Make it properly."},
  {id:40,name:"Cynar Spritz",emoji:"🌿",base:"aperitivo",tags:["bitter","bubbly","herbal","low-abv","refreshing","light"],ings:["Campari","Club Soda","Orange Juice"],parts:["1.5 shots Campari","3 shots Club Soda","1 shot Orange Juice"],method:"Fill a wine glass with ice. Add Campari and OJ. Top with club soda. Orange slice garnish.",flavor:"Bittersweet, citrus, effervescent — aperitivo hour in a glass.",note:"A Campari Spritz variation. The OJ softens the Campari's bitterness while the bubbles keep it lively. Perfect as a session drink or pre-dinner aperitivo."},
  {id:41,name:"Daiquiri",emoji:"🍋",base:"rum",tags:["citrus","tart","light","classic","refreshing"],ings:["Rum (White)","Lime Juice","Simple Syrup"],parts:["2 shots Rum (White)",".75 shot Lime Juice",".75 shot Simple Syrup"],method:"Shake vigorously with ice. Double strain into a chilled coupe.",flavor:"Bright, tart, clean citrus with subtle sweetness.",note:"The perfect litmus test for bartender skill. Three ingredients, infinite precision."},
  {id:42,name:"Dark & Stormy",emoji:"⛈️",base:"rum",tags:["spicy","tropical","rich","bubbly"],ings:["Rum (Dark)","Ginger Beer","Lime Juice"],parts:["2 shots Rum (Dark)","3 shots Ginger Beer",".5 shot Lime Juice"],method:"Fill a highball with ice. Add lime and ginger beer. Float dark rum on top over the back of a spoon.",flavor:"Molasses-rich rum, sharp ginger, tropical tartness.",note:"The float keeps rum on top for the first sip. Don't stir."},
  {id:43,name:"Death in the Afternoon",emoji:"💀",base:"liqueur",tags:["herbal","bubbly","complex","bold","spirit-forward","elegant"],ings:["Angostura Bitters","Club Soda"],parts:[".75 shot Absinthe or splash Angostura Bitters","4 shots Club Soda or Champagne"],method:"Pour absinthe into a champagne flute. Top very slowly with cold Champagne until it turns an opalescent louche.",flavor:"Anise, floral effervescence — the champagne blooms through the absinthe creating something other-worldly.",note:"Ernest Hemingway. 'Pour one jigger absinthe into a champagne glass. Add iced champagne until it attains the proper opalescent milkiness. Drink three to five of these slowly.' He was not joking."},

  // ── AMARO & DIGESTIF ─────────────────────────────────────────────────────────
  {id:44,name:"Dirty Banana",emoji:"🍌",base:"rum",tags:["tropical","creamy","sweet","coffee","dessert","rich"],ings:["Rum (Dark)","Banana Liqueur","Kahlúa","Coconut Cream"],parts:["1.5 shots Rum (Dark)","1 shot Banana Liqueur","1 shot Kahlúa","1 shot Coconut Cream"],method:"Shake or blend with ice. Serve chilled in a rocks glass.",flavor:"Banana, coconut, coffee — tropical dessert in a glass.",note:"Shake for a cocktail. Blend for a frozen version. Both are correct. Both are dangerous."},
  {id:45,name:"El Diablo",emoji:"😈",base:"tequila",tags:["spicy","fruity","citrus","bubbly","refreshing","complex"],ings:["Tequila (Blanco)","Blackberry Brandy","Lime Juice","Ginger Beer"],parts:["1.5 shots Tequila (Blanco)",".5 shot Blackberry Brandy",".5 shot Lime Juice","2 shots Ginger Beer"],method:"Build in a highball over ice. Add tequila, blackberry brandy, and lime. Top with ginger beer. Stir gently. Lime wheel garnish.",flavor:"Tequila brightness, berry sweetness, ginger heat, citrus — layered and lively.",note:"Originally made with Crème de Cassis. Blackberry brandy is your house version and captures the same dark berry note. The ginger does the heavy lifting on heat."},
  {id:46,name:"Espresso Martini",emoji:"☕",base:"vodka",tags:["coffee","sweet","rich","dessert"],ings:["Vodka","Kahlúa","Simple Syrup","Espresso"],parts:["1.5 shots Vodka",".75 shot Kahlúa",".5 shot Simple Syrup","1 shot Espresso (cooled)"],method:"Shake all ingredients very hard with ice — vigorous shaking creates the foam. Double strain into a chilled martini glass. Three coffee beans garnish.",flavor:"Bold coffee, sweet, slightly bitter finish with a silky foam head.",note:"Fresh espresso is mandatory. The foam only happens with a hard shake."},
  {id:47,name:"French 75",emoji:"🥂",base:"gin",tags:["citrus","bubbly","light","elegant","classic"],ings:["Gin","Lemon Juice","Simple Syrup","Club Soda"],parts:["1.5 shots Gin",".75 shot Lemon Juice",".5 shot Simple Syrup","3 shots Club Soda"],method:"Shake gin, lemon, syrup with ice. Strain into a champagne flute. Top with club soda or Champagne. Lemon twist garnish.",flavor:"Bright lemon, floral gin, effervescent and celebratory.",note:"Named after a WWI artillery gun. Club soda makes this everyday-accessible."},
  {id:48,name:"French Connection",emoji:"🤝",base:"brandy",tags:["sweet","warming","simple","spirit-forward","nutty"],ings:["Cognac","Amaretto"],parts:["1.5 shots Cognac","1 shot Amaretto"],method:"Build over ice in a rocks glass. Stir gently.",flavor:"Cognac depth, almond sweetness — warm, simple, and elegant.",note:"Two ingredients. Named after the 1971 Gene Hackman film. The cognac and amaretto ratio is adjustable — more amaretto for sweeter, more cognac for drier. No wrong answer."},
  {id:49,name:"Gimlet",emoji:"🍃",base:"gin",tags:["citrus","tart","light","herbal","refreshing"],ings:["Gin","Lime Juice","Simple Syrup"],parts:["2 shots Gin",".75 shot Lime Juice",".75 shot Simple Syrup"],method:"Shake with ice. Strain into a chilled coupe. Express a lime peel and discard.",flavor:"Clean, tart lime, botanical gin forward.",note:"Classic calls for Rose's Lime Cordial. Fresh lime + simple syrup is better."},
  {id:50,name:"Gin & Tonic",emoji:"🌿",base:"gin",tags:["bitter","herbal","bubbly","light","refreshing","simple"],ings:["Gin","Tonic Water"],parts:["2 shots Gin","3–4 shots Tonic Water"],method:"Fill a highball or copa glass with ice. Add gin. Top with tonic. Stir once gently. Lime and cucumber or herb garnish.",flavor:"Botanical, bitter quinine, clean and refreshing.",note:"Tonic quality is half the drink. Fever-Tree changes the equation."},
  {id:51,name:"Gin Buck",emoji:"🫚",base:"gin",tags:["spicy","citrus","bubbly","light","refreshing","simple"],ings:["Gin","Ginger Beer","Lemon Juice"],parts:["2 shots Gin","3 shots Ginger Beer",".5 shot Lemon Juice"],method:"Fill a highball with ice. Add gin and lemon juice. Top with ginger beer. Stir once. Lemon wedge garnish.",flavor:"Botanical gin, spicy ginger, bright lemon — clean, fast, refreshing.",note:"The gin answer to a Moscow Mule. Lemon instead of lime is the traditional Buck call. Herbaceous gins like Hendrick's or Tanqueray work especially well here."},
  {id:52,name:"Godfather",emoji:"🤌",base:"whiskey",tags:["sweet","smoky","warming","spirit-forward","simple"],ings:["Scotch","Amaretto"],parts:["2 shots Scotch","1 shot Amaretto"],method:"Stir over ice in a rocks glass.",flavor:"Smoky Scotch softened by sweet almond amaretto — simple, bold, and elegant.",note:"Adjust ratio to taste. More Amaretto = sweeter. More Scotch = drier and smokier. Both are correct."},
  {id:53,name:"Gold Rush",emoji:"🍯",base:"whiskey",tags:["citrus","sweet","tart","warming","rich"],ings:["Bourbon","Lemon Juice","Honey Syrup"],parts:["2 shots Bourbon",".75 shot Lemon Juice",".75 shot Honey Syrup"],method:"Make honey syrup: 2 parts honey dissolved in 1 part warm water. Shake all ingredients hard with ice. Double strain into a rocks glass over a large cube.",flavor:"Bright citrus, rich honey sweetness, warm bourbon backbone — rounder and more luxurious than a Whiskey Sour.",note:"Honey syrup gives silkiness that simple syrup can't. Make a batch — keeps two weeks refrigerated."},
  {id:54,name:"Golden Martinez",emoji:"✨",base:"gin",tags:["sweet","herbal","citrus","elegant","complex","spirit-forward"],ings:["Gin","Licor 43","Dry Vermouth","Orange Bitters"],parts:["1.5 shots Gin","1 shot Licor 43",".5 shot Dry Vermouth","2 dashes Orange Bitters"],method:"Stir with ice until well chilled. Strain into a coupe. Express and use orange peel as garnish.",flavor:"Botanical gin, vanilla-citrus Licor 43, herbal vermouth — rich, layered, and aromatic.",note:"A house original Martinez riff. Licor 43 replaces maraschino and transforms the whole drink."},
  {id:55,name:"Grasshopper",emoji:"🦗",base:"liqueur",tags:["minty","creamy","sweet","dessert","light"],ings:["Crème de Menthe","Crème de Cacao (Dark)","Heavy Cream"],parts:["1 shot Crème de Menthe","1 shot Crème de Cacao (Dark)","1 shot Heavy Cream"],method:"Shake with ice. Strain into a chilled coupe. Dusting of nutmeg or chocolate shavings.",flavor:"Minty, chocolatey, creamy — essentially a liquid thin mint.",note:"A dessert cocktail that fully commits. Using your Crème de Menthe makes this properly minty."},
  {id:56,name:"Greyhound",emoji:"🐕",base:"vodka",tags:["citrus","tart","light","refreshing","simple"],ings:["Vodka","Grapefruit Juice"],parts:["2 shots Vodka","4 shots Grapefruit Juice"],method:"Build in a highball over ice. Stir gently. Grapefruit wedge garnish.",flavor:"Clean vodka, tart-bitter grapefruit — dry, refreshing, completely unfussy.",note:"Salt the rim and it becomes a Salty Dog. Fresh grapefruit juice is dramatically better here. The bitterness of grapefruit handles the vodka in a way OJ never quite does."},
  {id:57,name:"Hanky Panky",emoji:"🪄",base:"gin",tags:["herbal","bitter","complex","spirit-forward","classic","dry"],ings:["Gin","Sweet Vermouth","Fernet-Branca"],parts:["1.5 shots Gin","1.5 shots Sweet Vermouth","2 dashes Fernet-Branca"],method:"Stir all ingredients with ice for 30 seconds. Strain into a chilled coupe. Orange twist garnish.",flavor:"Botanical gin, herbal vermouth, menthol Fernet depth — a martini crossed with a digestif.",note:"Ada Coleman, The Savoy, London, 1925. One of the few classic cocktails created by a woman. The Fernet is measured in dashes but its presence is absolute. Stir cold and serve immediately."},
  {id:58,name:"Harvard",emoji:"🎓",base:"brandy",tags:["herbal","sweet","spirit-forward","complex","classic","warming"],ings:["Brandy","Sweet Vermouth","Angostura Bitters"],parts:["1.5 shots Brandy","1 shot Sweet Vermouth","2 dashes Angostura Bitters"],method:"Stir with ice for 30 seconds. Strain into a chilled coupe. Lemon twist garnish.",flavor:"Brandy richness, herbal vermouth, aromatic bitters — a Manhattan's sophisticated older cousin.",note:"The Ivy League Manhattan. Same formula, different spirit. Cognac makes it richer. American brandy keeps it accessible. A great gateway for Manhattan drinkers looking to explore brandy."},
  {id:59,name:"Harvey Wallbanger",emoji:"🏄",base:"vodka",tags:["citrus","sweet","light","classic","retro"],ings:["Vodka","Orange Juice","Licor 43"],parts:["1.5 shots Vodka","4 shots Orange Juice",".5 shot Licor 43 (float)"],method:"Build vodka and OJ in a highball over ice. Float Licor 43 over the back of a spoon. Orange slice garnish.",flavor:"Orange juice base, clean vodka, vanilla-citrus Licor 43 float — a Screwdriver that got fancy.",note:"Originally made with Galliano — Licor 43 is the closest thing in your bar and works brilliantly. The float is essential. Harvey was allegedly a California surfer who drank too many and kept walking into walls."},
  {id:60,name:"Hemingway Daiquiri",emoji:"🎣",base:"rum",tags:["citrus","tart","complex","dry","classic","refreshing"],ings:["Rum (White)","Lime Juice","Grapefruit Juice","Maraschino Liqueur"],parts:["2 shots Rum (White)",".75 shot Lime Juice",".5 shot Grapefruit Juice",".5 shot Maraschino Liqueur"],method:"Shake all ingredients with ice. Double strain into a chilled coupe.",flavor:"Tart lime, dry grapefruit, cherry-almond maraschino, clean rum — a Daiquiri with depth and complexity.",note:"El Floridita, Havana. Hemingway was diabetic and wanted no sugar. The maraschino adds sweetness without syrup and the grapefruit adds a dry bitterness. Made for a man who wrote standing up."},
  {id:61,name:"Honeybee",emoji:"🍯",base:"rum",tags:["sweet","citrus","tropical","light","refreshing"],ings:["Rum (White)","Lemon Juice","Honey Syrup"],parts:["2 shots Rum (White)",".75 shot Lemon Juice",".75 shot Honey Syrup"],method:"Shake with ice. Strain into a chilled coupe.",flavor:"Clean rum, honey sweetness, bright citrus — a tropical Bee's Knees.",note:"The Bee's Knees formula with white rum. The honey makes this softer and rounder than a Daiquiri."},
  {id:62,name:"Horse's Neck",emoji:"🐴",base:"whiskey",tags:["spicy","citrus","bubbly","light","simple","classic"],ings:["Bourbon","Ginger Ale"],parts:["2 shots Bourbon","4 shots Ginger Ale"],method:"Add a long spiral of lemon peel to a highball glass — hang it over the rim. Fill with ice. Add bourbon. Top with ginger ale. Don't stir.",flavor:"Smooth bourbon, gentle ginger, lemon aromatics from the peel — simple and supremely drinkable.",note:"The long lemon spiral is the whole presentation. Cut it in one continuous piece and drape it over the glass edge. Ginger ale instead of ginger beer makes this gentler and more sessionable."},
  {id:63,name:"Hurricane",emoji:"🌀",base:"rum",tags:["tropical","fruity","sweet","tart","tiki","strong"],ings:["Rum (White)","Rum (Dark)","Orange Juice","Lime Juice","Grenadine","Simple Syrup"],parts:["1 shot Rum (White)","1 shot Rum (Dark)","1 shot Orange Juice","1 shot Lime Juice",".5 shot Grenadine",".5 shot Simple Syrup"],method:"Shake all ingredients with ice. Strain into a hurricane glass or large rocks glass over crushed ice. Orange and cherry garnish.",flavor:"Tropical fruit, layered rum, tart citrus, sweet grenadine — festive and deceptively strong.",note:"Pat O'Brien's New Orleans original, circa 1940s. Traditionally uses passion fruit syrup — OJ gets you there. The split rum gives depth. Goes down easy. Goes to your head faster."},
  {id:64,name:"Irish Coffee",emoji:"☘️",base:"whiskey",tags:["coffee","warming","creamy","sweet","classic"],ings:["Irish Whiskey","Coffee","Simple Syrup","Heavy Cream"],parts:["1.5 shots Irish Whiskey","4 shots Hot Coffee",".5 shot Simple Syrup","1 shot Heavy Cream (float)"],method:"Warm a glass. Add whiskey, hot coffee, and syrup. Stir. Float lightly whipped cream over the back of a spoon — do not stir.",flavor:"Warm whiskey, rich coffee, sweet cream float — a complete experience in one glass.",note:"The cream float is everything. Slightly whipped (not fully) so it pours slowly. Drink through it."},
  {id:65,name:"Jack Rose",emoji:"🌹",base:"brandy",tags:["citrus","tart","fruity","classic","refreshing","tart"],ings:["Apple Brandy","Lime Juice","Grenadine"],parts:["2 shots Apple Brandy",".75 shot Lime Juice",".5 shot Grenadine"],method:"Shake all ingredients with ice. Double strain into a chilled coupe. Apple fan or lime twist garnish.",flavor:"Apple brandy brightness, tart citrus, pomegranate-sweet grenadine — rosy and elegant.",note:"Pre-Prohibition American classic. The name comes from the rose color. Applejack or Calvados are traditional. Use lemon instead of lime for a slightly different character — both are correct."},
  {id:66,name:"Jasmine",emoji:"🌸",base:"gin",tags:["bitter","citrus","tart","complex","herbal","refreshing"],ings:["Gin","Campari","Triple Sec","Lemon Juice"],parts:["1.5 shots Gin",".25 shot Campari",".25 shot Triple Sec",".75 shot Lemon Juice"],method:"Shake all ingredients with ice. Double strain into a chilled coupe. Lemon twist garnish.",flavor:"Bright citrus-forward with a bitter Campari backbone and botanical gin — fresh and complex.",note:"Modern classic from 1990. The Campari is a supporting player here — just enough to add bitter depth without dominating. A gateway Campari cocktail for the skeptical."},
  {id:67,name:"Jungle Bird",emoji:"🦜",base:"rum",tags:["tropical","bitter","complex","sweet","tart"],ings:["Rum (Dark)","Campari","Pineapple Juice","Lime Juice","Simple Syrup"],parts:["1.5 shots Rum (Dark)",".75 shot Campari","1.5 shots Pineapple Juice",".5 shot Lime Juice",".5 shot Simple Syrup"],method:"Shake all ingredients with ice. Strain into a rocks glass over ice. Pineapple wedge garnish.",flavor:"Tropical, bitter, sweet-tart with dark rum depth.",note:"Campari in a tiki drink sounds wrong. It tastes completely right."},
  {id:68,name:"Kahlúa Sour",emoji:"☕",base:"liqueur",tags:["coffee","citrus","sweet","tart","approachable"],ings:["Kahlúa","Bourbon","Lemon Juice","Simple Syrup"],parts:["1 shot Kahlúa","1 shot Bourbon",".75 shot Lemon Juice",".25 shot Simple Syrup"],method:"Shake with ice. Strain over ice. Cherry garnish.",flavor:"Coffee liqueur meets whiskey sour — sweet, tart, complex.",note:"A sleeper hit. The coffee note from Kahlúa plays beautifully against lemon."},
  {id:69,name:"Kentucky Mule",emoji:"🐴",base:"whiskey",tags:["spicy","citrus","bubbly","refreshing","light"],ings:["Bourbon","Ginger Beer","Lime Juice"],parts:["2 shots Bourbon","3 shots Ginger Beer",".5 shot Lime Juice"],method:"Fill a copper mug or highball with crushed ice. Add bourbon and lime. Top with ginger beer. Stir gently. Lime wedge garnish.",flavor:"Warm bourbon, spicy ginger, bright lime — a Moscow Mule grown up and moved South.",note:"Everything the Moscow Mule is but with more character. Bourbon's vanilla and caramel notes play beautifully against ginger heat."},
  {id:70,name:"Kir Royale",emoji:"💜",base:"liqueur",tags:["fruity","bubbly","light","sweet","elegant","low-abv"],ings:["Blackberry Brandy","Club Soda"],parts:[".5 shot Blackberry Brandy","4 shots Club Soda"],method:"Pour blackberry brandy into a champagne flute. Top slowly with cold club soda or Champagne.",flavor:"Dark berry, lightly sweet, effervescent and elegant.",note:"Traditionally Crème de Cassis with Champagne. Blackberry brandy makes this a house version that works beautifully. Add a frozen raspberry if you have one."},
  // ── WHISKEY ADDITIONS ────────────────────────────────────────────────────────
  {id:71,name:"Last Word",emoji:"🗣️",base:"gin",tags:["herbal","citrus","tart","complex","classic","balanced"],ings:["Gin","Maraschino Liqueur","Chartreuse (Green)","Lime Juice"],parts:[".75 shot Gin",".75 shot Maraschino Liqueur",".75 shot Chartreuse (Green)",".75 shot Lime Juice"],method:"Shake all equal parts with ice. Double strain into a chilled coupe.",flavor:"Botanical gin, cherry-almond maraschino, herbal Chartreuse, bright lime — equal parts magic.",note:"Detroit Athletic Club, Prohibition era. Equal parts of four completely different things that somehow work perfectly. One of the great cocktails ever created. The Chartreuse carries the whole thing."},
  {id:72,name:"Lemon Drop",emoji:"🍋",base:"vodka",tags:["citrus","tart","sweet","light","refreshing","classic"],ings:["Vodka","Triple Sec","Lemon Juice","Simple Syrup"],parts:["2 shots Vodka",".5 shot Triple Sec",".75 shot Lemon Juice",".25 shot Simple Syrup"],method:"Sugar rim optional. Shake all ingredients hard with ice. Strain into a chilled martini glass or coupe. Lemon twist garnish.",flavor:"Tart lemon, clean vodka, subtle orange — bright and unapologetically refreshing.",note:"The 1970s San Francisco original. Sugar rim is classic but optional. Don't confuse 'simple' with 'easy' — the lemon ratio is everything."},
  {id:73,name:"Madras",emoji:"🌅",base:"vodka",tags:["fruity","citrus","light","sweet","refreshing"],ings:["Vodka","Cranberry Juice","Orange Juice"],parts:["1.5 shots Vodka","2 shots Cranberry Juice","2 shots Orange Juice"],method:"Build in a highball over ice. Stir gently. Orange slice garnish.",flavor:"Citrus orange, tart cranberry, clean vodka — a Screwdriver and Cape Cod in the same glass.",note:"Named after the Indian city. A Screwdriver married to a Cape Codder. The OJ and cranberry balance each other perfectly — neither dominates."},
  {id:74,name:"Mai Tai",emoji:"🌺",base:"rum",tags:["tropical","citrus","sweet","tiki","complex"],ings:["Rum (White)","Rum (Dark)","Lime Juice","Triple Sec","Grenadine"],parts:["1 shot Rum (White)","1 shot Rum (Dark)","1 shot Lime Juice",".5 shot Triple Sec",".5 shot Grenadine"],method:"Shake all ingredients with ice. Strain over fresh ice in a rocks or tiki glass. Lime wedge and cherry garnish.",flavor:"Tropical citrus, layered rum depth, lightly sweet with a bright finish.",note:"The split rum is the move — white gives brightness, dark gives depth."},
  {id:75,name:"Manhattan",emoji:"🍒",base:"whiskey",tags:["spirit-forward","herbal","sweet","classic","warming"],ings:["Rye Whiskey","Sweet Vermouth","Angostura Bitters"],parts:["2 shots Rye Whiskey","1 shot Sweet Vermouth","2 dashes Angostura Bitters"],method:"Stir all ingredients with ice for 30 seconds. Strain into a chilled coupe or rocks glass. Cherry garnish.",flavor:"Rich, herbal, spirit-forward with a sweet cherry finish.",note:"Bourbon makes it sweeter. Rye keeps it sharp. The vermouth ratio is the variable — adjust to preference."},
  {id:76,name:"Margarita",emoji:"🍋",base:"tequila",tags:["citrus","tart","classic","refreshing","balanced"],ings:["Tequila (Blanco)","Triple Sec","Lime Juice","Salt"],parts:["2 shots Tequila (Blanco)","1 shot Triple Sec","1 shot Lime Juice"],method:"Salt rim optional. Shake all ingredients with ice. Strain over fresh ice or up in a coupe. Lime wheel garnish.",flavor:"Bright citrus, agave backbone, clean and balanced.",note:"The ratio is everything: 2:1:1. Fresh lime is non-negotiable. Cointreau > cheap triple sec."},
  {id:77,name:"Martini",emoji:"🍸",base:"gin",tags:["spirit-forward","dry","herbal","classic","elegant"],ings:["Gin","Dry Vermouth"],parts:["2.5 shots Gin",".5 shot Dry Vermouth"],method:"Stir with ice for 45 seconds. Strain into a chilled martini glass. Lemon twist or olive garnish.",flavor:"Crisp, botanical, cold, and ruthlessly clean.",note:"Stir don't shake — shaking clouds the drink. The vermouth ratio defines it."},
  {id:78,name:"Matador",emoji:"🐂",base:"tequila",tags:["tropical","citrus","tart","light","refreshing"],ings:["Tequila (Blanco)","Pineapple Juice","Lime Juice"],parts:["1.5 shots Tequila (Blanco)","3 shots Pineapple Juice",".5 shot Lime Juice"],method:"Shake all ingredients with ice. Strain into a rocks glass over ice or a chilled coupe. Pineapple wedge garnish.",flavor:"Tequila agave, tropical pineapple, tart lime — bright and uncomplicated.",note:"Pineapple and tequila are a natural pairing — the sweetness and acid in the juice handle the spirit beautifully. Dead simple and reliably delicious."},
  {id:79,name:"Mexican Mule",emoji:"🌮",base:"tequila",tags:["spicy","citrus","bubbly","refreshing","light"],ings:["Tequila (Blanco)","Ginger Beer","Lime Juice"],parts:["2 shots Tequila (Blanco)","3 shots Ginger Beer",".5 shot Lime Juice"],method:"Fill a copper mug or highball with crushed ice. Add tequila and lime. Top with ginger beer. Stir gently. Lime wheel and jalapeño slice garnish.",flavor:"Agave brightness, ginger heat, bright lime — a mule built for warmer climates.",note:"The Mule formula works with every spirit. Tequila's vegetal brightness against ginger's heat is underrated. Add a jalapeño slice if you want to lean into it."},
  {id:80,name:"Mimosa",emoji:"🍊",base:"liqueur",tags:["citrus","bubbly","light","sweet","brunch","low-abv"],ings:["Orange Juice","Club Soda"],parts:["2 shots Orange Juice","3 shots Club Soda or Champagne"],method:"Pour cold OJ into a champagne flute. Top with cold Champagne or club soda. Don't stir. Orange twist optional.",flavor:"Bright orange, effervescent, light and celebratory.",note:"The brunch standard. The only rule is cold OJ and cold bubbles. Buck's Fizz is the British version with a higher juice ratio. Simple, cheerful, completely correct."},
  {id:81,name:"Mint Julep",emoji:"🌿",base:"whiskey",tags:["refreshing","sweet","herbal","light","classic"],ings:["Bourbon","Simple Syrup","Mint"],parts:["2.5 shots Bourbon",".5 shot Simple Syrup","8–10 Mint leaves"],method:"Gently muddle mint with syrup in a julep cup or rocks glass. Fill with crushed ice. Add bourbon. Stir. Top with more crushed ice. Pack fresh mint on top.",flavor:"Cool mint, sweet, bourbon warmth — refreshing in a way that sneaks up on you.",note:"Crushed ice is mandatory. The mint is aromatics — you smell it more than taste it."},
  {id:82,name:"Mojito",emoji:"🌿",base:"rum",tags:["herbal","citrus","bubbly","refreshing","light","classic"],ings:["Rum (White)","Lime Juice","Simple Syrup","Mint","Club Soda"],parts:["2 shots Rum (White)","1 shot Lime Juice",".5 shot Simple Syrup","8–10 Mint leaves","2 shots Club Soda"],method:"Gently muddle mint with syrup and lime in a highball. Add rum and ice. Top with club soda. Stir from the bottom. Mint sprig garnish.",flavor:"Fresh mint, bright lime, light rum — impossibly refreshing.",note:"Don't over-muddle the mint or it turns bitter. Gentle press, not a pound."},
  {id:83,name:"Moscow Mule",emoji:"🫚",base:"vodka",tags:["spicy","citrus","light","bubbly","refreshing"],ings:["Vodka","Ginger Beer","Lime Juice"],parts:["2 shots Vodka","3 shots Ginger Beer",".5 shot Lime Juice"],method:"Fill a copper mug or highball with crushed ice. Add vodka and lime. Top with ginger beer. Stir gently.",flavor:"Crisp, spicy ginger, bright citrus with a clean vodka base.",note:"Ginger beer quality changes everything. Fever-Tree or Reed's."},
  {id:84,name:"Naked & Famous",emoji:"⚡",base:"tequila",tags:["bitter","citrus","complex","bold","smoky"],ings:["Tequila (Reposado)","Aperol","Amaretto","Lemon Juice"],parts:[".75 shot Tequila (Reposado)",".75 shot Aperol",".75 shot Amaretto",".75 shot Lemon Juice"],method:"Equal parts everything. Shake with ice. Double strain into a chilled coupe.",flavor:"Smoky agave, bitter orange, nutty almond, bright lemon — wildly complex.",note:"Paper Plane's tequila cousin. Same equal-parts principle, totally different personality."},
  {id:85,name:"Negroni",emoji:"🍊",base:"gin",tags:["bitter","herbal","citrus","spirit-forward","classic"],ings:["Gin","Sweet Vermouth","Campari"],parts:["1 shot Gin","1 shot Sweet Vermouth","1 shot Campari"],method:"Stir all ingredients with ice for 30 seconds. Strain into a rocks glass over a large cube. Express an orange peel.",flavor:"Bitter, herbal, citrus-forward with a bittersweet complexity.",note:"Equal parts is the philosophy. Go 1.5 shots gin if Campari feels too aggressive."},
  {id:86,name:"Negroni Sbagliato",emoji:"🍾",base:"aperitivo",tags:["bitter","bubbly","light","herbal","low-abv"],ings:["Campari","Sweet Vermouth","Club Soda"],parts:["1 shot Campari","1 shot Sweet Vermouth","2 shots Club Soda"],method:"Build in a rocks glass over ice. Stir once gently. Orange slice garnish.",flavor:"Lightly bitter, herbal, effervescent — a Negroni with bubbles.",note:"The 'mistake' Negroni. Someone grabbed sparkling wine instead of gin. The mistake was better."},
  {id:87,name:"New York Sour",emoji:"🍷",base:"whiskey",tags:["citrus","tart","fruity","sweet","complex","elegant"],ings:["Bourbon","Lemon Juice","Simple Syrup","Egg White"],parts:["2 shots Bourbon",".75 shot Lemon Juice",".75 shot Simple Syrup",".5 Egg White"],method:"Dry shake all ingredients without ice. Add ice, shake hard. Strain into a rocks glass over ice. Slowly float .5 shot dry red wine over the back of a spoon.",flavor:"Whiskey sour foundation with a dry red wine float that bleeds down as you drink — tart, fruity, and visually stunning.",note:"The red wine float is the whole point. It creates a gradient that changes every sip. Use a dry red — Malbec or Cabernet. Don't stir it in."},
  {id:88,name:"Oaxacan Old Fashioned",emoji:"🌶️",base:"tequila",tags:["spirit-forward","smoky","sweet","complex","warming"],ings:["Tequila (Blanco)","Mezcal","Agave Nectar","Angostura Bitters","Orange Bitters"],parts:["1.5 shots Tequila (Blanco)",".5 shot Mezcal",".5 shot Agave Nectar","2 dashes Angostura Bitters","1 dash Orange Bitters"],method:"Stir all ingredients with ice for 30 seconds. Strain over a large cube. Express and use a flamed orange peel garnish.",flavor:"Agave-forward, smoky mezcal undercurrent, natural sweetness, aromatic bitters — a mezcal-spiked Old Fashioned.",note:"Phil Ward at Death & Co, NYC. The mezcal is the smoke signal. It shouldn't overpower — it should haunt. A little smoke goes a long way."},
  {id:89,name:"Old Fashioned",emoji:"🥃",base:"whiskey",tags:["spirit-forward","sweet","warming","classic"],ings:["Bourbon","Angostura Bitters","Simple Syrup"],parts:["2 shots Bourbon","2 dashes Angostura Bitters",".25 shot Simple Syrup"],method:"Add bitters and syrup to a rocks glass. Add bourbon and stir. Add a large ice cube and stir another 20 seconds. Express an orange peel over the top.",flavor:"Warm, caramel-rich, subtly spiced with a clean whiskey backbone.",note:"Rye makes this drier and spicier. Don't muddle a cherry — that's a Wisconsin Old Fashioned and it still splits the room."},
  {id:90,name:"Orange Sunset",emoji:"🌇",base:"liqueur",tags:["sweet","citrus","fruity","light","approachable"],ings:["Licor 43","Orange Juice","Grenadine"],parts:["1 shot Licor 43","3 shots Orange Juice","splash Grenadine"],method:"Build over ice in a tall glass. Add Licor 43 and OJ. Slowly pour grenadine down the side for the sunset layer. Do not stir.",flavor:"Sweet vanilla-citrus, bright orange, with a grenadine blush at the base.",note:"The gradient is the whole point — pour grenadine slowly and let it settle."},
  {id:91,name:"Painkiller",emoji:"🌴",base:"rum",tags:["tropical","creamy","sweet","fruity","tiki","rich"],ings:["Rum (Dark)","Pineapple Juice","Orange Juice","Coconut Cream"],parts:["2 shots Rum (Dark)","4 shots Pineapple Juice","1 shot Orange Juice","1 shot Coconut Cream"],method:"Shake all ingredients with ice. Strain into a large rocks glass or tiki mug over crushed ice. Freshly grated nutmeg garnish — mandatory.",flavor:"Tropical pineapple, creamy coconut, orange, dark rum depth — a sophisticated Piña Colada.",note:"Soggy Dollar Bar, British Virgin Islands. The nutmeg on top isn't decoration — it's aromatics that define every sip. Don't skip it. Use dark rum for depth."},
  {id:92,name:"Paloma",emoji:"🩷",base:"tequila",tags:["citrus","bubbly","light","refreshing","tart","grapefruit"],ings:["Tequila (Blanco)","Lime Juice","Simple Syrup","Grapefruit Soda","Salt"],parts:["2 shots Tequila (Blanco)",".5 shot Lime Juice",".25 shot Simple Syrup","3 shots Grapefruit Soda"],method:"Salt rim a highball. Add ice, tequila, lime, syrup. Top with grapefruit soda. Stir gently.",flavor:"Grapefruit-forward, tart, lightly sweet, effervescent.",note:"Mexico's most popular cocktail. Jarritos grapefruit soda is the traditional choice."},
  {id:93,name:"Paper Plane",emoji:"✈️",base:"whiskey",tags:["bitter","citrus","complex","tart","spirit-forward"],ings:["Bourbon","Aperol","Lemon Juice","Sweet Vermouth"],parts:["1 shot Bourbon","1 shot Aperol","1 shot Lemon Juice","1 shot Sweet Vermouth"],method:"Equal parts everything. Shake hard with ice. Double strain into a chilled coupe.",flavor:"Bitter, citrus, nutty, and whiskey-bright all at once.",note:"Equal parts is the entire philosophy. Make it exactly as written before adjusting."},
  {id:94,name:"Penicillin",emoji:"💊",base:"whiskey",tags:["smoky","citrus","spicy","complex","herbal"],ings:["Scotch","Lemon Juice","Honey Syrup","Ginger Beer"],parts:["2 shots Scotch",".75 shot Lemon Juice",".75 shot Honey Syrup","splash Ginger Beer"],method:"Shake Scotch, lemon, and honey syrup with ice. Strain into a rocks glass over ice. Add a small splash of ginger beer. Candied ginger garnish.",flavor:"Smoky, sweet honey, bright lemon, warm ginger.",note:"One of the great modern classics. The smoke from the Scotch makes this unforgettable."},
  {id:95,name:"Pickle Martini",emoji:"🥒",base:"vodka",tags:["savory","briny","dry","bold","spirit-forward"],ings:["Vodka","Pickle Juice","Dry Vermouth"],parts:["2 shots Vodka",".5 shot Pickle Juice","Dry Vermouth rinse"],method:"Rinse a chilled martini glass with dry vermouth and discard. Shake vodka and pickle juice with ice. Strain into the rinsed glass. Pickle spear garnish.",flavor:"Clean vodka, brine, dry vermouth aromatics — savory and uncompromising.",note:"Midwest pickle chaos. This is not for everyone. It is absolutely for someone. That someone knows who they are."},
  {id:96,name:"Pink Gin",emoji:"🌷",base:"gin",tags:["bitter","herbal","spirit-forward","dry","simple","classic"],ings:["Gin","Angostura Bitters"],parts:["2.5 shots Gin","4 dashes Angostura Bitters"],method:"Add bitters to a chilled coupe or rocks glass. Swirl to coat. Add gin. Stir briefly with ice, strain, or serve on ice — your call.",flavor:"Botanical gin with aromatic bitters threading through — dry, herbal, beautifully simple.",note:"Royal Navy original. Gin rations plus bitters for seasickness. The bitters coat the glass more than mix in — you get aromatics every sip. Simple is sometimes everything."},

  // ── VODKA ADDITIONS ──────────────────────────────────────────────────────────
  {id:97,name:"Pisco Sour",emoji:"🇵🇪",base:"brandy",tags:["citrus","tart","creamy","complex","classic"],ings:["Brandy","Lime Juice","Simple Syrup","Egg White","Angostura Bitters"],parts:["2 shots Brandy",".75 shot Lime Juice",".75 shot Simple Syrup",".5 Egg White","3 dashes Angostura Bitters"],method:"Dry shake all ingredients without ice. Add ice and shake again hard. Strain into a chilled coupe. Dash bitters on top of the foam.",flavor:"Tart citrus, silky egg white foam, clean brandy depth — elegant and complex.",note:"Traditionally made with Pisco — brandy is the closest substitute in your bar. The bitters on foam is signature; don't skip it."},
  {id:98,name:"Piña Colada",emoji:"🍍",base:"rum",tags:["tropical","creamy","sweet","fruity"],ings:["Rum (White)","Coconut Cream","Pineapple Juice"],parts:["2 shots Rum (White)","1 shot Coconut Cream","2 shots Pineapple Juice"],method:"Blend all ingredients with a cup of ice until smooth. Pour into a tall glass. Pineapple wedge and cherry garnish. Or shake if no blender.",flavor:"Rich coconut, sweet pineapple, tropical and creamy.",note:"Blended is the correct form. Shaken is still good."},
  {id:99,name:"Poinsettia",emoji:"🌺",base:"liqueur",tags:["fruity","bubbly","tart","light","elegant","festive"],ings:["Triple Sec","Cranberry Juice","Club Soda"],parts:[".5 shot Triple Sec","1 shot Cranberry Juice","3 shots Club Soda or Champagne"],method:"Combine triple sec and cranberry in a champagne flute. Top slowly with Champagne or club soda. Orange twist garnish.",flavor:"Tart cranberry, orange brightness, effervescent — festive red and perfectly balanced.",note:"A holiday classic built for Champagne. The deep red color in a flute is the whole presentation. Triple sec adds just enough orange to lift the cranberry out of being one-note."},
  {id:100,name:"Queen's Park Swizzle",emoji:"👑",base:"rum",tags:["herbal","citrus","refreshing","complex","tart","classic"],ings:["Rum (Dark)","Lime Juice","Simple Syrup","Mint","Angostura Bitters"],parts:["2.5 shots Rum (Dark)",".75 shot Lime Juice",".75 shot Simple Syrup","10 Mint leaves","3 dashes Angostura Bitters"],method:"Muddle mint with syrup and lime in a tall glass. Fill with crushed ice. Add rum. Swizzle by rotating a bar spoon between your palms until the glass frosts. Add more crushed ice. Dash bitters on top.",flavor:"Dark rum depth, mint freshness, lime brightness, aromatic bitters — a sophisticated tropical Mojito.",note:"Queen's Park Hotel, Trinidad. The Angostura float on top is signature — you smell the bitters before you taste the drink. Swizzle properly until the glass is frosted on the outside."},
  {id:101,name:"Ramos Gin Fizz",emoji:"🥛",base:"gin",tags:["creamy","citrus","floral","light","classic","refreshing"],ings:["Gin","Lemon Juice","Lime Juice","Simple Syrup","Egg White","Heavy Cream","Club Soda"],parts:["2 shots Gin",".5 shot Lemon Juice",".5 shot Lime Juice",".75 shot Simple Syrup",".5 Egg White","1 shot Heavy Cream","2 shots Club Soda"],method:"Dry shake all ingredients except soda VERY hard for 2 minutes — longer than you think. Add ice, shake again hard. Strain into a tall glass. Slowly pour club soda through the foam.",flavor:"Silky, creamy, citrus-floral gin — one of the most texturally extraordinary cocktails in existence.",note:"New Orleans legend. The shake time is serious — minimum 90 seconds dry shake. The old bars had shake boys just for this drink. The foam should stand two inches above the glass rim."},
  {id:102,name:"Ranch Water",emoji:"🤠",base:"tequila",tags:["light","citrus","bubbly","refreshing","simple","dry"],ings:["Tequila (Blanco)","Lime Juice","Club Soda"],parts:["2 shots Tequila (Blanco)",".5 shot Lime Juice","4 shots Club Soda"],method:"Fill a highball or bottle with ice. Add tequila and lime. Top with club soda. Lime wedge garnish.",flavor:"Crisp agave, bright lime, effervescent — the most refreshing drink for hot weather.",note:"West Texas original. Traditionally made with Topo Chico sparkling water — use the best sparkling water you have. Three ingredients. No apologies. The less you do to it the better."},
  {id:103,name:"Rattlesnake",emoji:"🐍",base:"whiskey",tags:["herbal","tart","creamy","complex","spirit-forward"],ings:["Rye Whiskey","Lemon Juice","Simple Syrup","Egg White","Angostura Bitters"],parts:["2 shots Rye Whiskey",".75 shot Lemon Juice",".5 shot Simple Syrup",".5 Egg White","1 dash Angostura Bitters"],method:"Dry shake all ingredients vigorously without ice. Add ice, shake again hard. Strain into a chilled coupe. Bitters on foam garnish.",flavor:"Rye spice, bright citrus, silky egg white — a Whiskey Sour with more backbone.",note:"The Angostura in the mix rather than just on top adds a different dimension. Aromatic bitterness woven through the drink rather than sitting on top of it."},

  // ── GIN ADDITIONS ────────────────────────────────────────────────────────────
  {id:104,name:"Revolver",emoji:"🔫",base:"whiskey",tags:["coffee","sweet","spirit-forward","warming","complex"],ings:["Bourbon","Kahlúa","Orange Bitters"],parts:["2 shots Bourbon",".5 shot Kahlúa","2 dashes Orange Bitters"],method:"Stir all ingredients with ice for 30 seconds. Strain into a chilled coupe or rocks glass over a large cube. Flamed orange peel garnish.",flavor:"Bourbon-forward with coffee sweetness and citrus aromatics — a caffeinated Old Fashioned cousin.",note:"The Kahlúa is subtle — it's not a coffee cocktail, it's a whiskey cocktail with coffee depth. The orange bitters tie it all together. Flame that orange peel if you can."},
  {id:105,name:"Rob Roy",emoji:"🏴󠁧󠁢󠁳󠁣󠁴󠁿",base:"whiskey",tags:["smoky","herbal","spirit-forward","classic","dry"],ings:["Scotch","Sweet Vermouth","Angostura Bitters"],parts:["2 shots Scotch","1 shot Sweet Vermouth","2 dashes Angostura Bitters"],method:"Stir with ice until well chilled. Strain into a chilled coupe. Cherry garnish.",flavor:"Smoky, herbal, slightly sweet with a dry finish.",note:"A Manhattan made with Scotch. Use dry vermouth for a Dry Rob Roy."},
  {id:106,name:"Rum & Coke",emoji:"🥤",base:"rum",tags:["sweet","simple","approachable","light","classic"],ings:["Rum (Dark)","Cola","Lime Juice"],parts:["2 shots Rum (Dark)","4 shots Cola",".5 shot Lime Juice"],method:"Fill a highball with ice. Add rum and lime. Top with cola. Stir once. Lime wedge garnish.",flavor:"Sweet molasses rum, caramel cola, citrus brightness.",note:"The Cuba Libre. The lime is not optional — it transforms it. Use quality rum and cold cola."},
  {id:107,name:"Rum Flip",emoji:"🥚",base:"rum",tags:["rich","creamy","sweet","warming","dessert","complex"],ings:["Rum (Dark)","Whole Egg","Simple Syrup"],parts:["1.5 shots Rum (Dark)","1 Whole Egg",".75 shot Simple Syrup"],method:"Dry shake all ingredients vigorously without ice first. Add ice and shake again hard. Strain into a chilled coupe or rocks glass. Freshly grated nutmeg garnish.",flavor:"Silky, rich, warming dark rum with a velvet egg texture.",note:"The whole egg gives extraordinary silky body. Don't be afraid of the egg — dry shake it properly."},
  {id:108,name:"Rum Old Fashioned",emoji:"🍫",base:"rum",tags:["spirit-forward","sweet","warming","tropical","rich"],ings:["Rum (Dark)","Angostura Bitters","Simple Syrup"],parts:["2 shots Rum (Dark)","2 dashes Angostura Bitters",".25 shot Simple Syrup"],method:"Add bitters and syrup to a rocks glass. Add rum. Add large ice cube. Stir 20 seconds. Orange peel garnish.",flavor:"Molasses and vanilla rum, spiced bitters, caramel sweetness.",note:"The Old Fashioned formula works with any aged spirit. Dark rum makes it tropical and rich."},
  // APERITIVO
  {id:109,name:"Rum Punch",emoji:"🥊",base:"rum",tags:["tropical","fruity","citrus","sweet","tart","approachable"],ings:["Rum (Dark)","Orange Juice","Pineapple Juice","Grenadine","Lime Juice","Angostura Bitters"],parts:["2 shots Rum (Dark)","2 shots Orange Juice","1 shot Pineapple Juice",".5 shot Grenadine",".5 shot Lime Juice","2 dashes Angostura Bitters"],method:"Build in a tall glass over ice. Stir gently. Fruit garnish.",flavor:"Tropical fruit, dark rum depth, citrus brightness, sweet grenadine — the original crowd-pleaser.",note:"The formula: one sour, two sweet, three strong, four weak. One lime, two grenadine, three rum, four juice. Caribbean math that works every time."},
  {id:110,name:"Rusty Nail",emoji:"🔩",base:"whiskey",tags:["spirit-forward","sweet","warming","smoky","simple","classic"],ings:["Scotch","Drambuie"],parts:["2 shots Scotch",".75 shot Drambuie"],method:"Build over a large ice cube in a rocks glass. Stir gently. Lemon twist optional.",flavor:"Smoky Scotch, honeyed heather sweetness — two ingredients that were made for each other.",note:"Drambuie is Scotch-based honey liqueur so you're essentially drinking Scotch amplified. More Drambuie = sweeter. Less = drier. Find your number."},
  {id:111,name:"Salty Dog",emoji:"🐾",base:"vodka",tags:["citrus","tart","light","refreshing","simple"],ings:["Vodka","Grapefruit Juice","Salt"],parts:["2 shots Vodka","4 shots Grapefruit Juice","Salt rim"],method:"Salt the rim of a highball glass. Fill with ice. Add vodka and grapefruit juice. Stir gently.",flavor:"Tart grapefruit, clean vodka, the salt rim amplifying everything — crisp and coastal.",note:"A Greyhound with a salt rim. The salt isn't decoration — it suppresses bitterness and amplifies the grapefruit. Same drink, different experience."},
  {id:112,name:"Sardini Martini",emoji:"🍸",base:"liqueur",tags:["fruity","citrus","sweet","approachable","light"],ings:["Blackberry Brandy","Vodka","Triple Sec","Lemon Juice"],parts:["2 shots Blackberry Brandy","1 shot Vodka","1 shot Triple Sec","splash Lemon Juice"],method:"Shake with ice. Strain into a chilled martini glass.",flavor:"Rich dark berry, clean vodka, citrus brightness from Triple Sec and lemon.",note:"A house original. Named appropriately. The Blackberry Brandy is the star."},
  // NEW ADDITIONS
  {id:113,name:"Sazerac",emoji:"🟡",base:"whiskey",tags:["spirit-forward","herbal","classic","dry","complex"],ings:["Rye Whiskey","Simple Syrup","Peychaud's Bitters","Angostura Bitters"],parts:["2 shots Rye Whiskey",".25 shot Simple Syrup","3 dashes Peychaud's Bitters","1 dash Angostura Bitters"],method:"Rinse a chilled rocks glass with absinthe if you have it. Stir remaining ingredients with ice. Strain into the rinsed glass — no ice. Express lemon peel over top, discard.",flavor:"Rye spice, floral Peychaud's bitterness, hint of anise.",note:"New Orleans' native cocktail. No ice in the final glass. Peychaud's is the soul of this drink — worth having."},
  {id:114,name:"Screwdriver",emoji:"🍊",base:"vodka",tags:["fruity","sweet","light","citrus","simple","approachable"],ings:["Vodka","Orange Juice"],parts:["2 shots Vodka","4 shots Orange Juice"],method:"Build in a highball over ice. Stir gently. Orange slice garnish.",flavor:"Clean, bright, sweet citrus — the simplest vodka cocktail.",note:"Allegedly named by American oil workers who stirred it with a screwdriver. Honest and effective."},
  {id:115,name:"Sex on the Beach",emoji:"🏖️",base:"vodka",tags:["fruity","sweet","tropical","light","approachable"],ings:["Vodka","Peach Schnapps","Orange Juice","Cranberry Juice"],parts:["1.5 shots Vodka",".5 shot Peach Schnapps","2 shots Orange Juice","2 shots Cranberry Juice"],method:"Build in a highball over ice. Stir gently. Orange slice and cherry garnish.",flavor:"Sweet, fruity, peachy — a crowd-pleaser in the best sense.",note:"Not trying to be sophisticated. Succeeds completely at what it is."},
  {id:116,name:"Shirley Temple",emoji:"⭐",base:"liqueur",tags:["sweet","citrus","bubbly","light","approachable","non-alcoholic"],ings:["Grenadine","Ginger Ale","Orange Juice"],parts:[".5 shot Grenadine","4 shots Ginger Ale","1 shot Orange Juice"],method:"Fill a highball with ice. Add grenadine and OJ. Top with ginger ale. Stir gently. Cherry and orange garnish.",flavor:"Sweet grenadine, ginger, citrus — festive and cheerful without the alcohol.",note:"Named after the child star. Zero alcohol. The cherry on top is non-negotiable. This is the drink that makes non-drinkers feel included at a party. Never underestimate that."},
  {id:117,name:"Sidecar",emoji:"🏍️",base:"brandy",tags:["citrus","tart","elegant","classic","warming"],ings:["Brandy","Triple Sec","Lemon Juice"],parts:["2 shots Brandy","1 shot Triple Sec",".75 shot Lemon Juice"],method:"Sugar rim optional. Shake all ingredients with ice. Strain into a chilled coupe.",flavor:"Bright citrus, rich brandy, clean and elegant.",note:"One of the founding cocktails. Adjust lemon to taste."},
  {id:118,name:"Singapore Sling",emoji:"🌺",base:"gin",tags:["fruity","tropical","citrus","complex","classic","bubbly"],ings:["Gin","Triple Sec","Lemon Juice","Grenadine","Angostura Bitters","Club Soda"],parts:["1.5 shots Gin",".5 shot Triple Sec",".75 shot Lemon Juice",".5 shot Grenadine","1 dash Angostura Bitters","2 shots Club Soda"],method:"Shake gin, triple sec, lemon, grenadine, and bitters with ice. Strain into a highball over ice. Top with club soda. Fruit garnish.",flavor:"Fruity, citrusy, floral gin, lightly sweet — tropical and festive.",note:"Raffles Hotel, Singapore, circa 1915. The original calls for Cherry Heering and Benedictine. This version works with what you have and stays true to the spirit of the drink."},
  {id:119,name:"Sloe Gin Fizz",emoji:"🍇",base:"gin",tags:["fruity","bubbly","tart","light","refreshing","classic"],ings:["Gin","Blackberry Brandy","Lemon Juice","Simple Syrup","Club Soda"],parts:["1 shot Gin","1 shot Blackberry Brandy",".75 shot Lemon Juice",".5 shot Simple Syrup","2 shots Club Soda"],method:"Shake gin, blackberry brandy, lemon, and syrup with ice. Strain into a highball over ice. Top with club soda.",flavor:"Berry-bright, tart lemon, effervescent, gin backbone.",note:"Using blackberry brandy in place of sloe gin — different but captures the same fruity-tart spirit. Works beautifully."},
  {id:120,name:"Southside",emoji:"🌿",base:"gin",tags:["citrus","herbal","light","refreshing","classic","tart"],ings:["Gin","Lemon Juice","Simple Syrup","Mint"],parts:["2 shots Gin",".75 shot Lemon Juice",".75 shot Simple Syrup","6 Mint leaves"],method:"Muddle mint gently with syrup. Add gin, lemon, and ice. Shake hard. Double strain into a chilled coupe. Mint sprig garnish.",flavor:"Bright lemon, botanical gin, cool mint — a Gimlet's minty cousin.",note:"Chicago Southside origin, Prohibition era. Mint is muddled in the shaker, not the glass — strain it out completely. Closer to a Gimlet than a Mojito."},
  {id:121,name:"Spicy Margarita",emoji:"🌶️",base:"tequila",tags:["spicy","citrus","tart","complex","refreshing"],ings:["Tequila (Blanco)","Triple Sec","Lime Juice","Simple Syrup","Tajín","Jalapeño"],parts:["2 shots Tequila (Blanco)","1 shot Triple Sec",".75 shot Lime Juice",".25 shot Simple Syrup"],method:"Muddle 2–3 jalapeño slices. Add remaining ingredients and ice. Shake hard. Fine strain into a Tajín-rimmed rocks glass over ice.",flavor:"Bright citrus, agave depth, building heat, salty complexity.",note:"The Tajín rim is an active ingredient. Adjust jalapeño for heat preference."},
  {id:122,name:"St-Germain Spritz",emoji:"🌸",base:"liqueur",tags:["floral","light","bubbly","refreshing","sweet","elegant"],ings:["St-Germain Elderflower","Club Soda"],parts:["2 shots St-Germain Elderflower","3 shots Club Soda"],method:"Build in a large wine glass over ice. Stir gently. Lemon twist garnish.",flavor:"Delicate elderflower, lightly sweet, floral and refreshing.",note:"Traditionally with Champagne or white wine. Club soda is clean and lovely."},
  // BRANDY / LIQUEUR
  {id:123,name:"St. Germain Spritz",emoji:"🌸",base:"liqueur",tags:["floral","light","bubbly","refreshing","citrus","elegant"],ings:["St-Germain Elderflower","Lime Juice","Club Soda"],parts:["1.5 shots St-Germain Elderflower",".5 shot Lime Juice","3–4 shots Club Soda"],method:"Build over ice in a wine glass or highball. Add St-Germain and lime. Top with club soda. Stir gently.",flavor:"Delicate elderflower, bright citrus, effervescent and refreshing.",note:"The lime juice is the secret — it lifts the floral notes and keeps it from being cloying."},
  {id:124,name:"Stinger",emoji:"🌿",base:"brandy",tags:["minty","spirit-forward","classic","elegant","refreshing"],ings:["Brandy","Crème de Menthe"],parts:["2 shots Brandy","1 shot Crème de Menthe"],method:"Stir with ice. Strain into a chilled coupe or over crushed ice.",flavor:"Smooth brandy, cooling mint — deceptively simple, deceptively strong.",note:"A Rat Pack-era classic. The Crème de Menthe freshens without masking the brandy."},
  {id:125,name:"Suffering Bastard",emoji:"😤",base:"whiskey",tags:["spicy","citrus","complex","refreshing"],ings:["Bourbon","Gin","Lime Juice","Angostura Bitters","Ginger Beer"],parts:["1 shot Bourbon","1 shot Gin",".5 shot Lime Juice","2 dashes Angostura Bitters","3 shots Ginger Beer"],method:"Shake bourbon, gin, lime, and bitters with ice. Strain into a highball over ice. Top with ginger beer. Cucumber slice garnish.",flavor:"Bourbon warmth, gin botanicals, ginger bite, citrus brightness — more interesting than it has any right to be.",note:"Invented in Cairo, 1942. The name is apt after the second one."},
  {id:126,name:"Tequila Mule",emoji:"🌵",base:"tequila",tags:["spicy","citrus","bubbly","refreshing","light"],ings:["Tequila (Blanco)","Ginger Beer","Lime Juice"],parts:["2 shots Tequila (Blanco)","3 shots Ginger Beer",".5 shot Lime Juice"],method:"Fill a copper mug or highball with crushed ice. Add tequila and lime. Top with ginger beer. Stir gently.",flavor:"Agave brightness, sharp ginger, tart lime — the Moscow Mule's bolder cousin.",note:"The tequila's vegetal quality plays differently with ginger than vodka does. Worth making side by side."},
  {id:127,name:"Tequila Negroni",emoji:"🌵",base:"tequila",tags:["bitter","herbal","citrus","spirit-forward","complex"],ings:["Tequila (Blanco)","Sweet Vermouth","Campari"],parts:["1 shot Tequila (Blanco)","1 shot Sweet Vermouth","1 shot Campari"],method:"Stir all ingredients with ice. Strain into a rocks glass over a large cube. Orange peel garnish.",flavor:"Agave brightness through the bitter-herbal Negroni framework — surprising and excellent.",note:"Also called the Agavoni. The tequila's vegetal quality adds a dimension gin can't."},
  {id:128,name:"Tequila Sunrise",emoji:"🌅",base:"tequila",tags:["fruity","sweet","light","citrus","approachable"],ings:["Tequila (Blanco)","Orange Juice","Grenadine"],parts:["2 shots Tequila (Blanco)","4 shots Orange Juice",".5 shot Grenadine"],method:"Add tequila and OJ to a highball over ice. Slowly pour grenadine down the side. Do not stir.",flavor:"Orange-forward, sweet, tropical, visually dramatic.",note:"The gradient is the whole point. Pour grenadine slowly. Don't stir."},
  // RUM
  {id:129,name:"Three Dots and a Dash",emoji:"✦",base:"rum",tags:["tropical","complex","sweet","tiki","warming","herbal"],ings:["Rum (Dark)","Rum (Aged)","Triple Sec","Lime Juice","Orange Juice","Grenadine","Angostura Bitters"],parts:["1 shot Rum (Dark)","1 shot Rum (Aged)",".5 shot Triple Sec",".75 shot Lime Juice","1 shot Orange Juice",".25 shot Grenadine","1 dash Angostura Bitters"],method:"Shake all ingredients with ice. Strain into a tiki mug or tall glass over crushed ice. Three cherries and a pineapple chunk garnish — the Morse code for V, for Victory.",flavor:"Complex layered rum, tropical citrus, orange, hint of grenadine — rich and multi-dimensional.",note:"Donn Beach WWII tiki classic. The garnish is the whole point — three cherries and a pineapple chunk spells V in Morse code. Named for the Allied victory. Ceremony matters."},

  // ── BRANDY ADDITIONS ─────────────────────────────────────────────────────────
  {id:130,name:"Tom Collins",emoji:"🍋",base:"gin",tags:["citrus","bubbly","light","tart","refreshing","classic"],ings:["Gin","Lemon Juice","Simple Syrup","Club Soda"],parts:["2 shots Gin","1 shot Lemon Juice",".5 shot Simple Syrup","2–3 shots Club Soda"],method:"Shake gin, lemon, and syrup with ice. Strain into a highball over ice. Top with club soda. Cherry and orange garnish.",flavor:"Bright lemon, effervescent, clean and refreshing.",note:"The original long drink. Simple, honest, endlessly drinkable."},
  {id:131,name:"Tommy's Margarita",emoji:"🌵",base:"tequila",tags:["citrus","tart","balanced","spirit-forward","classic","refreshing"],ings:["Tequila (Blanco)","Lime Juice","Agave Nectar"],parts:["2 shots Tequila (Blanco)","1 shot Lime Juice",".5 shot Agave Nectar"],method:"Shake all ingredients hard with ice. Strain into a rocks glass over fresh ice. Lime wheel garnish. Salt rim optional.",flavor:"Pure agave, bright lime, natural sweetness — the Margarita stripped to its essence.",note:"Julio Bermejo at Tommy's Mexican Restaurant in San Francisco. Agave instead of triple sec keeps the agave flavor pure. The definitive modern Margarita for tequila lovers."},
  {id:132,name:"Toreador",emoji:"🦅",base:"tequila",tags:["citrus","fruity","tart","light","elegant"],ings:["Tequila (Blanco)","Apricot Brandy","Lime Juice"],parts:["2 shots Tequila (Blanco)",".75 shot Apricot Brandy",".75 shot Lime Juice"],method:"Shake with ice. Strain into a coupe.",flavor:"Agave brightness, sweet apricot, tart lime — clean and elegant.",note:"Apricot brandy is the surprise ingredient that makes this sing."},
  {id:133,name:"Toronto",emoji:"🍁",base:"whiskey",tags:["herbal","bitter","spirit-forward","complex","dry"],ings:["Rye Whiskey","Fernet-Branca","Simple Syrup","Angostura Bitters"],parts:["2 shots Rye Whiskey",".25 shot Fernet-Branca",".25 shot Simple Syrup","1 dash Angostura Bitters"],method:"Stir all ingredients with ice for 30 seconds. Strain into a chilled coupe. Orange twist garnish.",flavor:"Rye spice forward with Fernet's herbal bitterness threading through — dry, complex, and acquired-taste excellent.",note:"Fernet is polarizing. This is the cocktail that converts people. Start with less Fernet and work up. It should be a whisper of menthol and herbs, not a shout."},
  {id:134,name:"Tradewind",emoji:"🌬️",base:"rum",tags:["tropical","creamy","citrus","tiki","complex","light"],ings:["Rum (White)","Rum (Dark)","Coconut Cream","Apricot Brandy","Lemon Juice"],parts:["1 shot Rum (White)","1 shot Rum (Dark)","1 shot Coconut Cream",".5 shot Apricot Brandy",".5 shot Lemon Juice"],method:"Shake with ice. Strain into a coupe.",flavor:"Tropical coconut, bright apricot, lemon tartness, layered rum depth.",note:"The apricot brandy is what sets this apart from other tiki builds. Don't skip it."},
  {id:135,name:"Vieux Carré",emoji:"🎷",base:"whiskey",tags:["complex","herbal","spirit-forward","warming","classic"],ings:["Rye Whiskey","Brandy","Sweet Vermouth","Angostura Bitters","Orange Bitters"],parts:[".75 shot Rye Whiskey",".75 shot Brandy",".75 shot Sweet Vermouth","1 dash Angostura Bitters","1 dash Orange Bitters"],method:"Stir all ingredients with ice for 30 seconds. Strain into a rocks glass over a large cube. Lemon twist garnish.",flavor:"Rye spice, brandy richness, herbal vermouth — layered and deeply complex.",note:"New Orleans classic from the Hotel Monteleone bar, circa 1930s. Vieux Carré means 'French Quarter.' One of the great underrated cocktails."},
