// ─── ENGINE ───────────────────────────────────────────────────────────────────
const mkSet = list => new Set(list.map(s => s.toLowerCase().trim()));

const norm  = s => s.toLowerCase().trim().replace(/[-_]/g,' ').replace(/\s+/g,' ');
const owns  = (ing, set) => { const n=norm(ing); return [...set].some(s=>norm(s)===n||norm(s).includes(n)||n.includes(norm(s))); };

const canMake = (c, set) => c.ings.every(i => owns(i, set));

const missing = (c, set) => c.ings.filter(i => !owns(i, set));

const moreLike = (c, all, set, n=4) => {
  const score = x => x.tags.filter(t => c.tags.includes(t)).length*2 + (x.base===c.base?3:0) + (canMake(x,set)?2:0);
  return all.filter(x=>x.id!==c.id).sort((a,b)=>score(b)-score(a)).slice(0,n);
};

const suggest = ({flavs, base, set, all}) => {
  const ready = all.filter(c=>canMake(c,set));
  const almost = all.filter(c=>!canMake(c,set)).map(c=>({...c,miss:missing(c,set)})).filter(c=>c.miss.length===1);
  const score = c => {
    let s=0;
    if (flavs.length) s += flavs.filter(f=>c.tags.some(t=>t.includes(f.toLowerCase())||f.toLowerCase().includes(t))).length*10;
    if (base) {
      const p=base.toLowerCase(), b=c.base.toLowerCase();
      if (p.includes(b)||b.includes(p)||(p.includes('whiskey')&&['whiskey','bourbon','rye','scotch'].includes(b))) s+=8;
    }
    return s;
  };
  const res=[], used=new Set();
  for (const c of [...ready].sort((a,b)=>score(b)-score(a))) {
    if (res.length>=3) break;
    if (!used.has(c.id)) { res.push({...c,canMake:true,miss:[]}); used.add(c.id); }
  }
  if (res.length<3) {
    for (const c of [...almost].sort((a,b)=>score(b)-score(a))) {
      if (res.length>=3) break;
      if (!used.has(c.id)) { res.push({...c,canMake:false}); used.add(c.id); }
    }
  }
  const mc={};
  for (const c of all) {
    if (canMake(c,set)) continue;
    const m=missing(c,set);
    if (m.length===1) { mc[m[0]]=mc[m[0]]||[]; mc[m[0]].push(c.name); }
  }
  const top = Object.entries(mc).sort((a,b)=>b[1].length-a[1].length)[0];
  return { results: res, next: top ? {ing:top[0], unlocks:top[1]} : null };
};

async function searchExternal(q) {
  try {
    const r = await fetch(`https://www.thecocktaildb.com/api/json/v1/1/search.php?s=${encodeURIComponent(q)}`);
    const d = await r.json();
    if (!d.drinks) return [];
    return d.drinks.slice(0,5).map(x => {
      const ings=[], parts=[];
      for (let i=1;i<=15;i++) {
        const ing=x[`strIngredient${i}`], m=x[`strMeasure${i}`];
        if (ing?.trim()) { ings.push(ing.trim()); parts.push(toShots(m?.trim()||'',ing.trim())); }
      }
      const s=ings.join(' ').toLowerCase();
      const base=/bourbon|rye|whiskey|whisky/.test(s)?'whiskey':/scotch/.test(s)?'whiskey':/\bgin\b/.test(s)?'gin':/vodka/.test(s)?'vodka':/tequila|mezcal/.test(s)?'tequila':/\brum\b/.test(s)?'rum':'other';
      return {id:`ext_${x.idDrink}`,name:x.strDrink,emoji:'🍹',base,tags:[],ings,parts,method:x.strInstructions||'',flavor:`${x.strCategory||'Cocktail'} · ${x.strAlcoholic||''}`,note:`Imported from TheCocktailDB. Glass: ${x.strGlass||'unknown'}.`,isImported:true};
    });
  } catch { return null; }
}

function toShots(m, ing) {
  if (!m) return ing;
  const raw = m.toLowerCase().trim();

  const shotLabel = ozVal => {
    const s = ozVal / 1.5;
    const r = Math.round(s*4)/4;
    if(r<=0.15) return 'dash';
    if(r<=0.3)  return 'splash';
    if(r<=0.37) return '.25 shot';
    if(r<=0.62) return '.5 shot';
    if(r<=0.87) return '.75 shot';
    if(r<=1.12) return '1 shot';
    if(r<=1.37) return '1.25 shots';
    if(r<=1.62) return '1.5 shots';
    if(r<=1.87) return '1.75 shots';
    if(r<=2.12) return '2 shots';
    return `${r} shots`;
  };

  const parseNum = str => {
    str = str.trim();
    if (str.includes(' ')) {
      const p = str.split(' '); let v = parseFloat(p[0]);
      if (p[1] && p[1].includes('/')) { const [n,d]=p[1].split('/'); v+=parseFloat(n)/parseFloat(d); }
      return v;
    }
    if (str.includes('/')) { const [n,d]=str.split('/'); return parseFloat(n)/parseFloat(d); }
    return parseFloat(str);
  };

  // oz — 1 shot = 1.5oz
  const oz = raw.match(/^([\d\s./]+(?:\d\/\d)?)\s*oz/);
  if (oz) { const v=parseNum(oz[1]); if(!isNaN(v)) return `${shotLabel(v)} ${ing}`; }

  // ml — 1 shot = 44ml
  const ml = raw.match(/^([\d\s./]+(?:\d\/\d)?)\s*ml/);
  if (ml) { const v=parseNum(ml[1]); if(!isNaN(v)) return `${shotLabel(v/44)} ${ing}`; }

  // cl — 1 shot = 4.4cl
  const cl = raw.match(/^([\d\s./]+(?:\d\/\d)?)\s*cl/);
  if (cl) { const v=parseNum(cl[1]); if(!isNaN(v)) return `${shotLabel(v/4.4)} ${ing}`; }

  // parts — 1 part ≈ 1 shot
  const pt = raw.match(/^([\d\s./]+(?:\d\/\d)?)\s*parts?/);
  if (pt) { const v=parseNum(pt[1]); if(!isNaN(v)) return `${shotLabel(v*1.5)} ${ing}`; }

  // tsp / tbsp
  if (/\btsp\b/.test(raw))  return `dash ${ing}`;
  if (/\btbsp\b/.test(raw)) return `splash ${ing}`;

  return `${m} ${ing}`.trim();
}

// ─── CARD ─────────────────────────────────────────────────────────────────────
function Card({ c, set, onFav, onMore, onCart, cart, all, onEdit, onDelete, openId, setOpenId, open0=false }) {
  const controlled = openId !== undefined;
  const open = controlled ? openId===c.id : undefined;
  const [localOpen, setLocalOpen] = useState(open0);
  const isOpen = controlled ? open : localOpen;
  const toggle = () => {
    if (controlled) setOpenId(isOpen ? null : c.id);
    else setLocalOpen(o=>!o);
  };
  const mk = canMake(c, set);
  const mis = missing(c, set);
  const has = ing => owns(ing, set);
  return (
    <div className="card" id={`card-${c.id}`}>
      <div className="card-hdr" onClick={toggle}>
        <div style={{flex:1,minWidth:0}}>
          <div className="card-name">{c.emoji} {c.name}</div>
          <div style={{marginTop:4,display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
            {mk ? <span className="badge b-ready">✓ ready</span> : <span className="badge b-miss">{mis.length} needed</span>}
            {c.isImported && <span className="badge b-imp">imported</span>}
            {(c.tags||[]).slice(0,2).map(t=><span key={t} className="badge b-tag">{t}</span>)}
          </div>
        </div>
        <div className="card-meta">
          <button className={`fav${c.fav?' on':''}`} onClick={e=>{e.stopPropagation();onFav(c.id)}}>{c.fav?'★':'☆'}</button>

          <span className={`chev${isOpen?' open':''}`}>▶</span>
        </div>
      </div>
      {isOpen && (
        <div className="card-body">
          <div className="hero">{c.emoji}</div>
          <p className="lbl">Flavor Profile</p>
          <p className="flavor">{c.flavor}</p>
          <p className="lbl">Ingredients</p>
          <ul className="ings">
            {c.parts.map((p,i) => {
              const h=has(c.ings[i]||''), inCart=cart?.includes(c.ings[i]);
              return (
                <li key={i} className={h?'have':'need'}>
                  <span className="chk">{h?'✓':'○'}</span>
                  <span style={{flex:1}}>{p}</span>
                  {!h && onCart && !inCart && <button className="add-btn" onClick={e=>{e.stopPropagation();onCart(c.ings[i])}}>+</button>}
                  {!h && inCart && <span className="listed">✓ listed</span>}
                </li>
              );
            })}
          </ul>
          <p className="lbl">Method</p>
          <p className="instr">{c.method}</p>
          {c.note && <><p className="lbl">Notes</p><p className="note">{c.note}</p></>}
          {onMore && <div style={{marginTop:20}}><button className="btn ghost sm" onClick={()=>onMore(c)}>More like this →</button></div>}
          {(onEdit||onDelete) && (
            <div style={{display:'flex',gap:8,marginTop:12,paddingTop:12,borderTop:'1px solid var(--slate-light)'}}>
              {onEdit && <button className="btn ghost sm" onClick={()=>onEdit(c)}>✏️ Edit</button>}
              {onDelete && <button className="btn ghost sm" style={{color:'#c05050',borderColor:'#5a2020'}} onClick={()=>{if(window.confirm(`Remove "${c.name}" from your bar?`))onDelete(c)}}>🗑 Remove</button>}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function MoreModal({ c, all, set, onFav, onCart, cart, onClose }) {

  );
}

function RecipesView({ set, all, onFav, onMore, onCart, cart, onEdit, onDelete, surpriseId, onSurpriseSeen }) {
  const [q, setQ] = useState('');
  const [f, setF] = useState('all');
  const [openId, setOpenId] = useState(null);
  // Auto-open surprise card and scroll to it
  useEffect(()=>{
    if(surpriseId){
      setOpenId(surpriseId);
      setF('all');
      setQ('');
      onSurpriseSeen && onSurpriseSeen();
      // Wait one tick for the card to render open, then scroll to it
      setTimeout(()=>{
        const el = document.getElementById(`card-${surpriseId}`);
        if(el){
          const top = el.getBoundingClientRect().top + window.scrollY - 72;
          window.scrollTo({ top, behavior:'smooth' });
        }
      }, 80);
    }
  }, [surpriseId]);
  const filtered = all.filter(c => {
    const match = !q
      || c.name.toLowerCase().includes(q.toLowerCase())
      || c.ings.some(i=>i.toLowerCase().includes(q.toLowerCase()))
      || c.flavor.toLowerCase().includes(q.toLowerCase())
      || (c.tags||[]).some(t=>t.includes(q.toLowerCase()))
      || c.base.includes(q.toLowerCase());
    if (f==='ready')  return match && canMake(c,set);
    if (f==='favs')   return match && c.fav;
    if (f==='almost') { const m=missing(c,set); return match && m.length===1; }
    return match;
  });
  return (
    <div>
      <div className="swrap">
        <input className="sinput" placeholder="Search by name, ingredient, or flavor…" value={q} onChange={e=>setQ(e.target.value)} />
        {q && <button className="sclr" onClick={()=>setQ('')}>✕</button>}

      <div className="ftabs">
        {[['all','All'],['ready','✓ Can Make'],['almost','1 Away'],['favs','★ Favorites']].map(([id,l])=>(

        ))}
      </div>
      <div className="sec">
        {f==='favs' ? 'Favorites' : 'Cocktail Database'}
        <span className="cnt">{filtered.length} drinks</span>
      </div>
      {filtered.length===0
        ? <div className="empty">{f==='favs' ? 'No favorites yet. Tap ☆ on any drink.' : 'No cocktails match that search.'}</div>

      }
    </div>
  );
}

        <button className={`nb${catF==='all'?' on':''}`} style={{fontSize:'15px',padding:'9px 12px'}} onClick={()=>setCatF('all')}>All</button>
        {Object.keys(catalog).map(c=>(
          <button key={c} className={`nb${catF===c?' on':''}`} style={{fontSize:'14px',padding:'9px 10px'}} onClick={()=>setCatF(c)}>{c.split(' ')[0]}</button>
        ))}
      </div>
      <div style={{display:'flex',gap:6,marginBottom:16}}>
        <button className={`nb${showAll?' on':''}`} style={{fontSize:'14px',padding:'9px 18px',flex:1}} onClick={()=>setShowAll(true)}>Full Catalog</button>
        <button className={`nb${!showAll?' on':''}`} style={{fontSize:'14px',padding:'9px 18px',flex:1}} onClick={()=>setShowAll(false)}>Stocked Only</button>
      </div>
      {cats.map(([cat,items]) => {
        const visible = showAll ? items : items.filter(i=>owned.some(o=>o.toLowerCase()===i.toLowerCase()));
        if (!visible.length) return null;
        return (
          <div key={cat} className="icat">
            <div className="icattitle">
              {cat} <span style={{color:'#b8a98a',fontWeight:300}}>
                ({items.filter(i=>owned.some(o=>o.toLowerCase()===i.toLowerCase())).length}/{items.length})
              </span>
            </div>
            <div className="igrid">
              {visible.map(item => {
                const isOwned = owned.some(o=>o.toLowerCase()===item.toLowerCase());
                const inCart  = cart.includes(item);
                return (
                  <div key={item} className={`iitem${isOwned?' owned':' unowned'}`} onClick={()=>toggle(item)}>
                    <span className={`ichk${isOwned?' on':''}`}>{isOwned?'✓':''}</span>
                    <span className="iname">{item}</span>
                    {!isOwned && (
                      <button
                        className={`cartbtn${inCart?' in-cart':''}`}
                        onClick={e=>{e.stopPropagation();if(!inCart)onCart(item)}}
                      >{inCart?'✓':'+'}</button>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}

      {catalogEdit && <CatalogEditModal catalog={catalog} setCatalog={setCatalog} owned={owned} setOwned={setOwned} onClose={()=>setCatalogEdit(false)} />}
      {/* Edit Catalog button */}
      <div style={{marginTop:32,paddingTop:20,borderTop:'1px solid var(--slate-light)',textAlign:'center'}}>
        <p className="muted-txt" style={{marginBottom:10}}>Need to add, rename, or remove catalog entries?</p>
        <button className="btn ghost sm" onClick={()=>setCatalogEdit(true)}>⚙️ Edit Master Ingredient List</button>
      </div>

    </div>
  );
}

// ─── DISCOVER VIEW (Ideas + Find as side-by-side tiles) ───────────────────────
const FLAVORS = [["Bitter","🍊"],["Citrusy","🍋"],["Sweet","🍬"],["Smoky","💨"],["Tropical","🍍"],["Bubbly","🫧"],["Spirit-Forward","🥃"],["Herbal","🌿"],["Spicy","🌶️"],["Coffee","☕"],["Tart","🍑"],["Refreshing","💧"],["Creamy","🥛"],["Fruity","🍒"]];
const BASES   = ["Whiskey / Bourbon","Vodka","Gin","Rum","Tequila","Aperitivo","Scotch","No Preference"];
const BLANK_RECIPE = { name:'', emoji:'🍹', base:'other', flavor:'', method:'', note:'' };

function DiscoverView({ set, all, onFav, onMore, onCart, cart, onImport, onEdit, apiKey, onScan, onGoSettings }) {
  const [open, setOpen] = useState(null); // null | 'ideas' | 'find'

  // Ideas state
  const [flavs, setFlavs]   = useState([]);
  const [base, setBase]     = useState('');
  const [res, setRes]       = useState(null);
  const toggleFlav = f => setFlavs(prev=>prev.includes(f)?prev.filter(x=>x!==f):[...prev,f]);
  const goIdeas = () => setRes(suggest({flavs, base:base==='No Preference'?'':base, set, all}));
  const readyCount = all.filter(c=>canMake(c,set)).length;

  // Find state
  const [q, setQ]                     = useState('');
  const [findRes, setFindRes]         = useState(null);
  const [loading, setLoading]         = useState(false);
  const [networkBlocked, setBlocked]  = useState(false);
  const [imported, setImported]       = useState(new Set());
  const [manualMode, setManualMode]   = useState(false);
  const [draft, setDraft]             = useState(BLANK_RECIPE);
  const [draftTags, setDraftTags]     = useState([]);
  const toggleDraftTag = t => setDraftTags(prev => prev.includes(t) ? prev.filter(x=>x!==t) : [...prev,t]);
  const [ingLines, setIngLines]       = useState(['','','']);

  const inDB = name => all.some(c=>c.name.toLowerCase()===name.toLowerCase());
  const doImport = c => { onImport(c); setImported(prev=>new Set([...prev,c.id])); };

  const goSearch = async () => {
    if (!q.trim()) return;
    setLoading(true); setFindRes(null); setBlocked(false);
    const r = await searchExternal(q);
    if (r===null) setBlocked(true);
    else if (r.length===0) setFindRes([]);
    else setFindRes(r);
    setLoading(false);
  };

  const updateIng = (i,val) => { const n=[...ingLines]; n[i]=val; setIngLines(n); };
  const submitManual = () => {
    const name = draft.name.trim();
    if (!name) return;
    const filled = ingLines.filter(l=>l.trim());
    const ings   = filled.map(l=>l.split('—')[0].trim()||l.trim());
    onImport({ id:`manual_${Date.now()}`, name, emoji:draft.emoji||'🍹', base:draft.base||'other',
      tags:draftTags, ings, parts:filled, method:draft.method.trim()||'See recipe.',
      flavor:draft.flavor.trim()||'', note:draft.note.trim()||'', isImported:true });
    setDraft(BLANK_RECIPE); setIngLines(['','','']); setDraftTags([]); setManualMode(false);
  };

  const handleTile = which => setOpen(prev => prev===which ? null : which);

  return (
    <div>
      <div className="disc-tiles" style={{marginTop:4}}>
        <div className={`disc-tile${open==='ideas'?' open':''}`} onClick={()=>handleTile('ideas')}>
          <span className="disc-tile-icon">✦</span>
          <span className="disc-tile-label">Ideas</span>
          <span className="disc-tile-sub">Get suggestions from your bar</span>
        </div>
        <div className={`disc-tile${open==='find'?' open':''}`} onClick={()=>handleTile('find')}>
          <span className="disc-tile-icon">🔍</span>
          <span className="disc-tile-label">Find</span>
          <span className="disc-tile-sub">Search & add new recipes</span>
        </div>
      </div>

      {/* ── IDEAS PANEL ── */}
      {open==='ideas' && (
        <div className="disc-panel">
          <div className="psec" style={{marginTop:16}}>
            <p className="lbl">Flavor notes</p>
            <div className="pgrid">
              {FLAVORS.map(([f,icon])=><button key={f} className={`chip${flavs.includes(f)?' on':''}`} onClick={()=>toggleFlav(f)}>{icon} {f}</button>)}
            </div>
          </div>
          <div className="psec">
            <p className="lbl">Base spirit</p>
            <div className="pgrid">
              {BASES.map(b=><button key={b} className={`chip${base===b?' on':''}`} onClick={()=>setBase(prev=>prev===b?'':b)}>{b}</button>)}
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:16,flexWrap:'wrap',marginBottom:20}}>
            <button className="btn" onClick={goIdeas}>Suggest Drinks</button>
            <span style={{fontSize:'1.05rem',fontWeight:300,color:'#b8a98a'}}>{readyCount} ready now</span>
          </div>
          {res && (
            <div className="rpanel">
              <p className="rtitle">{flavs.length===0&&!base?"Tonight's Options":"Matched to Your Preferences"}</p>
              {res.results.length===0
                ? <div className="empty" style={{padding:'16px 0'}}>No strong matches — try adjusting.</div>
                : res.results.map(c=>(
                    <div key={c.id} className="ritem">
                      <div className="rname">{c.emoji} {c.name} {c.canMake?<span className="badge b-ready">ready</span>:<span className="badge b-miss">needs: {c.miss?.[0]}</span>}</div>
                      <p className="rreason">{(c.tags||[]).slice(0,3).join(', ')} — {c.flavor.split('.')[0].toLowerCase()}.</p>
                      <Card c={c} set={set} onFav={onFav} onMore={onMore} onCart={onCart} cart={cart} all={all} onEdit={onEdit} />
                    </div>
                  ))
              }
              {res.next && (
                <div className="acqbox">
                  <p className="acqtitle">Next Acquisition</p>
                  <p className="acqname">{res.next.ing}</p>
                  <p className="acqsub">Unlocks {res.next.unlocks.length} new drink{res.next.unlocks.length>1?'s':''}: {res.next.unlocks.join(', ')}</p>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* ── FIND PANEL ── */}
      {open==='find' && (
        <div className="disc-panel">
          {!manualMode && (
            <>
              <p className="muted-txt" style={{marginTop:16}}>Search TheCocktailDB or add a recipe manually.</p>
              <div className="arow">
                <input className="ainput" placeholder="Search cocktail name…" value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&goSearch()} style={{fontSize:'1rem'}} />
                <button className="btn" onClick={goSearch} disabled={loading}>{loading?'…':'Search'}</button>
              </div>
              <div style={{marginBottom:16,display:'flex',flexDirection:'column',gap:8}}>
                <button className="btn ghost sm" onClick={()=>setManualMode(true)}>+ Add Recipe Manually</button>
                {apiKey?.length > 10 ? (
                  <button className="btn ghost sm" style={{borderColor:'var(--amber-dim)',color:'var(--amber)'}} onClick={onScan}>
                    📷 Scan a Recipe with Camera
                  </button>
                ) : (
                  <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'var(--slate-mid)',border:'1px solid var(--slate-light)',borderRadius:8}}>
                    <span style={{fontSize:'1.1rem'}}>📷</span>
                    <div style={{flex:1}}>
                      <p style={{fontFamily:"'DM Mono',monospace",fontSize:'.84rem',fontWeight:300,color:'#b8a98a',margin:0,lineHeight:1.6}}>
                        <strong style={{color:'var(--chalk)'}}>Camera Recipe Scanning</strong><br/>
                        Snap any recipe and import it instantly.
                      </p>
                    </div>
                    <button className="btn ghost sm" style={{flexShrink:0,fontSize:'.78rem'}} onClick={onGoSettings}>Set Up →</button>
                  </div>
                )}
              </div>
            </>
          )}
          {manualMode && (
            <div style={{background:'var(--slate-mid)',border:'1px solid var(--amber-dim)',borderRadius:8,padding:18,marginTop:14,marginBottom:16}}>
              <p className="lbl" style={{marginTop:0}}>Add a Recipe</p>
              <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap'}}>
                <input className="ainput" placeholder="Cocktail name…" value={draft.name} onChange={e=>setDraft(d=>({...d,name:e.target.value}))} style={{flex:2,minWidth:140}} />
                <input className="ainput" placeholder="🍹" value={draft.emoji} onChange={e=>setDraft(d=>({...d,emoji:e.target.value}))} style={{width:58,textAlign:'center',fontSize:'1.2rem'}} />
              </div>
              <p className="lbl">Ingredients <span style={{color:'#b8a98a',fontSize:'8px',letterSpacing:'.1em'}}>— include measure e.g. "2 shots Gin"</span></p>
              {ingLines.map((line,i)=>(
                <div key={i} style={{display:'flex',gap:6,marginBottom:6}}>
                  <input className="ainput" placeholder={`Ingredient ${i+1}…`} value={line} onChange={e=>updateIng(i,e.target.value)} />
                  {ingLines.length>1 && <button className="btn ghost sm" onClick={()=>setIngLines(p=>p.filter((_,idx)=>idx!==i))}>✕</button>}
                </div>
              ))}
              <button className="btn ghost sm" onClick={()=>setIngLines(p=>[...p,''])} style={{marginBottom:12}}>+ ingredient</button>
              <p className="lbl">Flavor Profile</p>
              <textarea className="ainput" placeholder="e.g. Bright citrus, herbaceous…" value={draft.flavor} onChange={e=>setDraft(d=>({...d,flavor:e.target.value}))} rows={2} style={{width:'100%',marginBottom:8,resize:'none'}} />
              <p className="lbl">Method</p>
              <textarea className="ainput" placeholder="Build instructions…" value={draft.method} onChange={e=>setDraft(d=>({...d,method:e.target.value}))} rows={3} style={{width:'100%',marginBottom:8}} />
              <p className="lbl">Notes</p>
              <input className="ainput" placeholder="Optional tips…" value={draft.note} onChange={e=>setDraft(d=>({...d,note:e.target.value}))} style={{width:'100%',marginBottom:12}} />
              <p className="lbl">Tags <span style={{color:'#b8a98a',fontSize:'8px',letterSpacing:'.1em'}}>— tap to select</span></p>
              <div className="pgrid" style={{marginBottom:14}}>
                {FLAVORS.map(([f,icon])=><button key={f} className={`chip${draftTags.includes(f.toLowerCase())?' on':''}`} onClick={()=>toggleDraftTag(f.toLowerCase())}>{icon} {f}</button>)}
              </div>
              <div style={{display:'flex',gap:10}}>
                <button className="btn" onClick={submitManual} disabled={!draft.name.trim()}>Add to Library</button>
                <button className="btn ghost" onClick={()=>{setManualMode(false);setDraft(BLANK_RECIPE);setIngLines(['','','']);setDraftTags([]);}}>Cancel</button>
              </div>
            </div>
          )}
          {loading && <div style={{padding:'24px 0',textAlign:'center'}}><div className="dots"><span/><span/><span/></div></div>}
          {networkBlocked && (
            <div style={{background:'var(--slate-mid)',border:'1px solid var(--slate-light)',borderRadius:8,padding:18,marginTop:4}}>
              <p style={{color:'var(--amber)',fontSize:'15px',letterSpacing:'.2em',textTransform:'uppercase',marginBottom:8}}>External Search Unavailable</p>
              <p style={{color:'var(--cream)',fontSize:'1.19rem',fontWeight:300,lineHeight:1.7,marginBottom:14}}>
                The cocktail database can't be reached in this preview environment. Use the form above to add recipes manually, or deploy the app to enable live search.
              </p>
              <button className="btn sm" onClick={()=>setManualMode(true)}>+ Add Recipe Manually</button>
            </div>
          )}
          {findRes!==null && findRes.length===0 && <div className="empty">No recipes found for "{q}".</div>}
          {findRes?.map(r => {
            const inApp=inDB(r.name), wasImported=imported.has(r.id);
            return (
              <div key={r.id} className="card" style={{marginBottom:14}}>
                <div className="card-hdr" style={{cursor:'default'}}>
                  <div className="card-emoji">{r.emoji}</div>
                  <div className="card-info">
                    <div className="card-name">{r.name}</div>
                    <div className="card-tags"><span className="badge b-imp">from database</span></div>
                  </div>
                  <div>
                    {inApp ? <span style={{fontSize:'14px',color:'#b8a98a'}}>in library</span>
                      : wasImported ? <span style={{fontSize:'14px',color:'var(--amber)'}}>✓ added</span>
                      : <button className="btn sm" onClick={()=>doImport(r)}>Add</button>}
                  </div>
                </div>
                <div className="card-body" style={{borderTop:'1px solid var(--slate-light)',padding:'12px 16px'}}>
                  <p className="lbl">Ingredients</p>
                  <ul className="ings">{r.parts.map((p,i)=><li key={i} className="have"><span className="chk">·</span>{p}</li>)}</ul>
                  <p className="lbl" style={{marginTop:12}}>Method</p>
                  <p className="instr">{r.method}</p>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── CART MANUAL ADD ─────────────────────────────────────────────────────────
function CartManualAdd({ setCart }) {
  const [val, setVal] = useState('');
  const add = () => {
    const t = val.trim();
    if (!t) return;
    setCart(prev => prev.includes(t) ? prev : [...prev, t]);
    setVal('');
  };
  return (
    <div style={{display:'flex',gap:8,marginTop:16,marginBottom:4}}>
      <input
        className="ainput"
        placeholder="Add item manually…"
        value={val}
        onChange={e=>setVal(e.target.value)}
        onKeyDown={e=>e.key==='Enter'&&add()}
        style={{flex:1}}
      />
      <button className="btn sm" onClick={add}>Add</button>
    </div>
  );
}

// ─── EDIT MODAL ───────────────────────────────────────────────────────────────
function EditModal({ c, onSave, onClose }) {
  const [draft, setDraft] = useState({
    name:   c.name,
    emoji:  c.emoji,
    flavor: c.flavor,
    method: c.method,
    note:   c.note || '',
  });
  const [parts, setParts] = useState([...c.parts]);
  const [ings,  setIngs]  = useState([...c.ings]);
  const [editTags, setEditTags] = useState((c.tags||[]).map(t=>t.toLowerCase()));
  const toggleEditTag = t => setEditTags(prev => prev.includes(t) ? prev.filter(x=>x!==t) : [...prev,t]);

  const updatePart = (i, val) => { const n=[...parts]; n[i]=val; setParts(n); };
  const updateIng  = (i, val) => { const n=[...ings];  n[i]=val; setIngs(n); };
  const addRow = () => { setParts(p=>[...p,'']); setIngs(g=>[...g,'']); };
  const removeRow = i => { setParts(p=>p.filter((_,idx)=>idx!==i)); setIngs(g=>g.filter((_,idx)=>idx!==i)); };

  const save = () => {
    onSave({ ...c, ...draft, parts, ings, tags: editTags });
    onClose();
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="mpanel" onClick={e=>e.stopPropagation()} style={{maxHeight:'92vh'}}>
        <div className="mhdr">
          <p className="meyebrow">Recipe</p>
          <h3 className="mtitle">Edit {c.name}</h3>
          <button className="mclose" onClick={onClose}>✕</button>
        </div>
        <div className="mbody">
          <div style={{display:'flex',gap:8,marginBottom:12}}>
            <input className="ainput" value={draft.name} onChange={e=>setDraft(d=>({...d,name:e.target.value}))} placeholder="Name" style={{flex:1}} />
            <input className="ainput" value={draft.emoji} onChange={e=>setDraft(d=>({...d,emoji:e.target.value}))} style={{width:54,textAlign:'center',fontSize:'1.3rem'}} />
          </div>
          <p className="lbl">Ingredients</p>
          {parts.map((p,i)=>(
            <div key={i} style={{display:'flex',gap:6,marginBottom:7,alignItems:'center'}}>
              <input className="ainput" value={p} onChange={e=>updatePart(i,e.target.value)} placeholder="Measure + ingredient" style={{flex:2}} />
              <input className="ainput" value={ings[i]||''} onChange={e=>updateIng(i,e.target.value)} placeholder="Ingredient key" style={{flex:1}} />
              <button className="btn ghost sm" onClick={()=>removeRow(i)} style={{flexShrink:0,padding:'9px 10px'}}>✕</button>
            </div>
          ))}
          <button className="btn ghost sm" onClick={addRow} style={{marginBottom:16}}>+ row</button>
          <p className="lbl">Flavor Profile</p>
          <textarea className="ainput" value={draft.flavor} onChange={e=>setDraft(d=>({...d,flavor:e.target.value}))} rows={2} style={{width:'100%',marginBottom:10,resize:'none'}} />
          <p className="lbl">Method</p>
          <textarea className="ainput" value={draft.method} onChange={e=>setDraft(d=>({...d,method:e.target.value}))} rows={3} style={{width:'100%',marginBottom:10}} />
          <p className="lbl">Notes</p>
          <input className="ainput" value={draft.note} onChange={e=>setDraft(d=>({...d,note:e.target.value}))} style={{width:'100%',marginBottom:12}} />
          <p className="lbl">Tags <span style={{color:'#b8a98a',fontSize:'8px',letterSpacing:'.1em'}}>— tap to select</span></p>
          <div className="pgrid" style={{marginBottom:16}}>
            {FLAVORS.map(([f,icon])=><button key={f} className={`chip${editTags.includes(f.toLowerCase())?' on':''}`} onClick={()=>toggleEditTag(f.toLowerCase())}>{icon} {f}</button>)}
          </div>
          <div style={{display:'flex',gap:10}}>
            <button className="btn" onClick={save}>Save Changes</button>
            <button className="btn ghost" onClick={onClose}>Cancel</button>
          </div>
        </div>
      </div>
    </div>
  );
}


// ─── CART FAB + SHEET (global, always visible when cart has items) ────────────
function CartPanel({ cart, setCart, owned, setOwned }) {
  const [open, setOpen] = useState(false);
  const hasItems = cart.length > 0;
  const buyIt = item => {
    if (!owned.some(o=>o.toLowerCase()===item.toLowerCase())) setOwned(prev=>[...prev,item]);
    setCart(prev=>prev.filter(i=>i!==item));
  };
  return (
    <>
      <button
        className="cart-fab"
        onClick={()=>setOpen(true)}
        title={`Shopping list (${cart.length})`}
      >
        🛒
        <span className="cart-fab-badge">{cart.length}</span>
      </button>
      {open && (
        <div className="overlay" onClick={()=>setOpen(false)}>
          <div className="mpanel" onClick={e=>e.stopPropagation()}>
            <div className="mhdr">
              <p className="meyebrow">Inventory</p>
              <h3 className="mtitle">🛒 Shopping List</h3>
              <button className="mclose" onClick={()=>setOpen(false)}>✕</button>
            </div>
            <div className="mbody">
              {!hasItems ? (
                <div>
                  <div style={{textAlign:'center',padding:'24px 0 20px'}}>
                    <div style={{fontSize:'2.5rem',marginBottom:12}}>🛒</div>
                    <p style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',fontSize:'1.15rem',color:'var(--chalk)',marginBottom:8}}>Your list is empty.</p>
                    <p style={{fontFamily:"'DM Mono',monospace",fontWeight:300,fontSize:'1.12rem',color:'#b8a98a',lineHeight:1.7,maxWidth:260,margin:'0 auto 20px'}}>Tap <strong style={{color:'var(--amber)'}}>+</strong> on any unowned ingredient in the Inventory page to add it here.</p>
                  </div>
                  <CartManualAdd setCart={setCart} />
                </div>
              ) : (
                <>
                  <p className="muted-txt">Tap "Got it" to add to your bar and remove from list.</p>
                  {cart.map(item=>(
                    <div key={item} className="sitem">
                      <span className="sname">{item}</span>
                      <div style={{display:'flex',gap:8,flexShrink:0}}>
                        <button className="btn sm" onClick={()=>buyIt(item)}>Got it ✓</button>
                        <button className="btn ghost sm" onClick={()=>setCart(prev=>prev.filter(i=>i!==item))}>✕</button>
                      </div>
                    </div>
                  ))}
                  <CartManualAdd setCart={setCart} />
                  <div style={{marginTop:16}}>
                    <button className="btn ghost" onClick={()=>setCart([])}>Clear List</button>
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      )}
    </>
  );
}


// ─── SETTINGS VIEW ────────────────────────────────────────────────────────────
function SettingsView({ apiKey, setApiKey }) {
  const [draft, setDraft] = useState(apiKey || '');
  const [saved, setSaved] = useState(false);
  const save = () => { setApiKey(draft.trim()); setSaved(true); setTimeout(()=>setSaved(false), 2000); };
  return (
    <div style={{padding:'8px 0'}}>
      <div className="sec">Settings</div>

// ─── SCAN MODAL ───────────────────────────────────────────────────────────────
function ScanModal({ apiKey, onImport, onClose, onGoSettings }) {
  const [status, setStatus] = useState('idle'); // idle | loading | review | error
  const [result, setResult] = useState(null);
  const [errMsg, setErrMsg] = useState('');
  const [scanTags, setScanTags] = useState([]);
  const toggleScanTag = t => setScanTags(prev => prev.includes(t) ? prev.filter(x=>x!==t) : [...prev,t]);
  const fileRef = useRef(null);

  const processImage = async (file) => {
    setStatus('loading');
    try {
      // Convert image to base64
      const b64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(',')[1]);
        r.onerror = rej;
        r.readAsDataURL(file);
      });

      const mediaType = file.type || 'image/jpeg';

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1024,
          messages: [{
            role: 'user',
            content: [
              {
                type: 'image',
                source: { type: 'base64', media_type: mediaType, data: b64 }
              },
              {
                type: 'text',
                text: `Extract the cocktail recipe from this image and return ONLY valid JSON with no markdown, no explanation, just the raw JSON object:
{
  "name": "cocktail name",
  "emoji": "single most fitting emoji",
  "flavor": "one sentence flavor description",
  "parts": ["measurement + ingredient", ...],
  "ings": ["ingredient name only", ...],
  "method": "preparation instructions",
  "note": "any tips or notes, empty string if none"
}

For measurements convert everything to shots (1 shot = 1.5oz = 44ml). Use: dash, splash, .25 shot, .5 shot, .75 shot, 1 shot, 1.5 shots, 2 shots etc.
If this image does not contain a cocktail recipe, return: {"error": "No recipe found"}`
              }
            ]
          }]
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(()=>({}));
        throw new Error(err?.error?.message || `API error ${response.status}`);
      }

      const data = await response.json();
      const text = data.content?.[0]?.text || '';
      const clean = text.replace(/```json|```/g,'').trim();
      const parsed = JSON.parse(clean);

      if (parsed.error) { setErrMsg(parsed.error); setStatus('error'); return; }

      // Build full recipe object
      const recipe = {
        id: `scan_${Date.now()}`,
        base: detectBase(parsed.ings || []),
        tags: [],
        isImported: true,
        isScan: true,
        ...parsed,
      };
      setResult(recipe);
      setStatus('review');
    } catch(e) {
      setErrMsg(e.message || 'Something went wrong. Check your API key and try again.');
      setStatus('error');
    }
  };

  const detectBase = ings => {
    const s = ings.join(' ').toLowerCase();
    if (/bourbon|rye|whiskey|whisky/.test(s)) return 'whiskey';
    if (/scotch/.test(s)) return 'whiskey';
    if (/\bgin\b/.test(s)) return 'gin';
    if (/vodka/.test(s)) return 'vodka';
    if (/tequila|mezcal/.test(s)) return 'tequila';
    if (/\brum\b/.test(s)) return 'rum';
    return 'other';
  };

  const handleFile = e => {
    const file = e.target.files?.[0];
    if (file) processImage(file);
  };

  const confirmImport = () => { onImport({...result, tags:scanTags}); onClose(); };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="mpanel" onClick={e=>e.stopPropagation()}>
        <div className="mhdr">
          <p className="meyebrow">Camera Import</p>
          <h3 className="mtitle">Scan a Recipe</h3>
          <button className="mclose" onClick={onClose}>✕</button>
        </div>
        <div className="mbody">

          {!apiKey && (
            <div style={{textAlign:'center',padding:'20px 0'}}>
              <div style={{fontSize:'2rem',marginBottom:12}}>🔑</div>
              <p style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',fontSize:'1.15rem',color:'var(--chalk)',marginBottom:8}}>API key required</p>
              <p className="muted-txt" style={{marginBottom:16}}>Camera scanning uses Claude Vision. Add your free Anthropic API key in Settings to activate it.</p>
              <button className="btn" onClick={()=>{onClose();onGoSettings();}}>Go to Settings</button>
            </div>
          )}

          {apiKey && status==='idle' && (
            <div style={{textAlign:'center',padding:'20px 0'}}>
              <div style={{fontSize:'2.5rem',marginBottom:16}}>📷</div>
              <p style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',fontSize:'1.15rem',color:'var(--chalk)',marginBottom:8}}>Point at any recipe</p>
              <p className="muted-txt" style={{marginBottom:24}}>Works with cocktail menus, recipe cards, book pages, or handwritten notes.</p>
              <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handleFile} />
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                <button className="btn" onClick={()=>fileRef.current.click()}>
                  📷 Take Photo
                </button>
                <button className="btn ghost" onClick={()=>{fileRef.current.removeAttribute('capture');fileRef.current.click();fileRef.current.setAttribute('capture','environment');}}>
                  🖼 Choose from Library
                </button>
              </div>
            </div>
          )}

          {status==='loading' && (
            <div style={{textAlign:'center',padding:'40px 0'}}>
              <div className="dots" style={{justifyContent:'center',marginBottom:16}}><span/><span/><span/></div>
              <p style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',fontSize:'1.1rem',color:'var(--chalk)'}}>Reading the recipe…</p>
            </div>
          )}

          {status==='error' && (
            <div style={{textAlign:'center',padding:'20px 0'}}>
              <div style={{fontSize:'2rem',marginBottom:12}}>⚠️</div>
              <p style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',fontSize:'1.1rem',color:'var(--chalk)',marginBottom:8}}>Couldn't read that one</p>
              <p className="muted-txt" style={{marginBottom:20}}>{errMsg}</p>
              <button className="btn" onClick={()=>setStatus('idle')}>Try Again</button>
            </div>
          )}

          {status==='review' && result && (
            <div>
              <p className="muted-txt" style={{marginBottom:16}}>Looks right? Tap Import to add it to your library.</p>
              <div className="card" style={{marginBottom:16}}>
                <div style={{padding:'16px 16px 8px'}}>
                  <div className="card-name">{result.emoji} {result.name}</div>
                  <p className="flavor" style={{marginTop:8}}>{result.flavor}</p>
                </div>
                <div style={{padding:'0 16px 16px'}}>
                  <p className="lbl">Ingredients</p>
                  <ul className="ings">
                    {result.parts.map((p,i)=>(
                      <li key={i} className="have"><span className="chk">·</span><span>{p}</span></li>
                    ))}
                  </ul>
                  <p className="lbl" style={{marginTop:12}}>Method</p>
                  <p className="instr">{result.method}</p>
                  {result.note && <><p className="lbl" style={{marginTop:12}}>Notes</p><p className="note">{result.note}</p></>}
                </div>
              </div>
              <p className="lbl">Tags <span style={{color:'#b8a98a',fontSize:'8px',letterSpacing:'.1em'}}>— tap to select</span></p>
              <div className="pgrid" style={{marginBottom:14}}>
                {FLAVORS.map(([f,icon])=><button key={f} className={`chip${scanTags.includes(f.toLowerCase())?' on':''}`} onClick={()=>toggleScanTag(f.toLowerCase())}>{icon} {f}</button>)}
              </div>
              <div style={{display:'flex',gap:10}}>
                <button className="btn" onClick={confirmImport}>Import Recipe</button>
                <button className="btn ghost" onClick={()=>{setStatus('idle');setScanTags([])}}>Scan Again</button>
              </div>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}


// ─── CATALOG EDIT MODAL ───────────────────────────────────────────────────────
function CatalogEditModal({ catalog, setCatalog, owned, setOwned, onClose }) {
  const [draft, setDraft]       = useState(() => JSON.parse(JSON.stringify(catalog)));
  const [activeCat, setActiveCat] = useState(Object.keys(catalog)[0]);
  const [editingItem, setEditingItem] = useState(null); // {cat, idx, val}
  const [newItemVal, setNewItemVal]   = useState('');
  const [newCatVal, setNewCatVal]     = useState('');
  const [warn, setWarn]         = useState(null); // {msg, onConfirm}
  const [dirty, setDirty]       = useState(false);

  // How many DB recipes use this ingredient
  const recipeUseCount = ing => {
    const n = ing.toLowerCase();
    return DB.filter(r => r.ings.some(i => i.toLowerCase() === n)).length;
  };

  const updateItem = (cat, idx, newVal) => {
    const trimmed = newVal.trim();
    if (!trimmed) return;
    setDraft(prev => {
      const next = {...prev, [cat]: [...prev[cat]]};
      const old = next[cat][idx];
      next[cat][idx] = trimmed;
      // Update owned list to reflect rename
      setOwned(o => o.map(x => x.toLowerCase()===old.toLowerCase() ? trimmed : x));
      return next;
    });
    setEditingItem(null);
    setDirty(true);
  };

  const deleteItem = (cat, idx) => {
    const item = draft[cat][idx];
    const uses = recipeUseCount(item);
    const isOwned = owned.some(o => o.toLowerCase() === item.toLowerCase());
    const msgs = [];
    if (uses > 0) msgs.push(`used in ${uses} recipe${uses>1?'s':''}`);
    if (isOwned) msgs.push('currently in your bar');
    const doDelete = () => {
      setDraft(prev => {
        const next = {...prev, [cat]: prev[cat].filter((_,i)=>i!==idx)};
        return next;
      });
      if (isOwned) setOwned(o => o.filter(x => x.toLowerCase() !== item.toLowerCase()));
      setDirty(true);
      setWarn(null);
    };
    if (msgs.length) {
      setWarn({ msg: `"${item}" is ${msgs.join(' and ')}. Deleting it will remove it from your inventory and may affect recipe matching.`, onConfirm: doDelete });
    } else {
      doDelete();
    }
  };

  const addItem = cat => {
    const t = newItemVal.trim();
    if (!t) return;
    if (draft[cat].some(x => x.toLowerCase() === t.toLowerCase())) return;
    setDraft(prev => ({...prev, [cat]: [...prev[cat], t]}));
    setNewItemVal('');
    setDirty(true);
  };

  const addCategory = () => {
    const t = newCatVal.trim();
    if (!t || draft[t]) return;
    setDraft(prev => ({...prev, [t]: []}));
    setActiveCat(t);
    setNewCatVal('');
    setDirty(true);
  };

  const deleteCategory = cat => {
    const items = draft[cat];
    const inUse = items.filter(i => recipeUseCount(i) > 0 || owned.some(o=>o.toLowerCase()===i.toLowerCase()));
    const doDelete = () => {
      setDraft(prev => { const next={...prev}; delete next[cat]; return next; });
      setOwned(o => o.filter(x => !items.some(i=>i.toLowerCase()===x.toLowerCase())));
      setActiveCat(Object.keys(draft).find(k=>k!==cat) || '');
      setDirty(true);
      setWarn(null);
    };
    if (inUse.length) {
      setWarn({ msg: `This category contains ${inUse.length} item${inUse.length>1?'s':''} in use (stocked or in recipes). Deleting will remove them from your inventory.`, onConfirm: doDelete });
    } else {
      doDelete();
    }
  };

  const renameCategory = (old, newName) => {
    const t = newName.trim();
    if (!t || t === old) return;
    setDraft(prev => {
      const next = {};
      Object.entries(prev).forEach(([k,v]) => { next[k===old ? t : k] = v; });
      return next;
    });
    setActiveCat(t);
    setDirty(true);
  };

  const save = () => { setCatalog(draft); onClose(); };
  const reset = () => { setDraft(JSON.parse(JSON.stringify(DEFAULT_CATALOG))); setDirty(true); };

  const cats = Object.keys(draft);

  return (
    <div className="overlay" onClick={onClose}>
      <div className="mpanel" onClick={e=>e.stopPropagation()} style={{maxHeight:'94vh'}}>
        <div className="mhdr">
          <p className="meyebrow">Inventory</p>
          <h3 className="mtitle">Edit Master List</h3>
          <button className="mclose" onClick={onClose}>✕</button>
        </div>
        <div className="mbody" style={{paddingBottom:8}}>

          {/* Warning dialog */}
          {warn && (
            <div style={{background:'rgba(180,60,40,.1)',border:'1px solid rgba(180,60,40,.3)',borderRadius:8,padding:14,marginBottom:16}}>
              <p style={{fontFamily:"'DM Mono',monospace",fontSize:'.84rem',fontWeight:300,color:'var(--chalk)',lineHeight:1.7,marginBottom:12}}>⚠️ {warn.msg}</p>
              <div style={{display:'flex',gap:8}}>
                <button className="btn sm" style={{background:'#8b2020',borderColor:'#8b2020'}} onClick={warn.onConfirm}>Delete Anyway</button>
                <button className="btn ghost sm" onClick={()=>setWarn(null)}>Cancel</button>
              </div>
            </div>
          )}

          {/* Category tabs */}
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
            {cats.map(cat => (
              <button key={cat} className={`nb${activeCat===cat?' on':''}`}
                style={{fontSize:'13px',padding:'7px 10px'}}
                onClick={()=>setActiveCat(cat)}>
                {cat.split(' ')[0]}
              </button>
            ))}
          </div>

          {activeCat && draft[activeCat] && (
            <div>
              {/* Category header with rename/delete */}
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                <input
                  key={activeCat}
                  className="ainput"
                  defaultValue={activeCat}
                  onBlur={e=>renameCategory(activeCat, e.target.value)}
                  style={{flex:1,fontFamily:"'Cormorant Garamond',serif",fontSize:'1.1rem'}}
                />
                <button className="btn ghost sm" style={{color:'#c05050',borderColor:'#5a2020',flexShrink:0}}
                  onClick={()=>deleteCategory(activeCat)}>Delete Category</button>
              </div>

              {/* Items list */}
              <div style={{maxHeight:'38vh',overflowY:'auto',marginBottom:12}}>
                {draft[activeCat].map((item, idx) => {
                  const uses = recipeUseCount(item);
                  const isOwned = owned.some(o=>o.toLowerCase()===item.toLowerCase());
                  const isEditing = editingItem?.cat===activeCat && editingItem?.idx===idx;
                  return (
                    <div key={idx} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 0',borderBottom:'1px solid var(--slate-light)'}}>
                      {isEditing ? (
                        <input className="ainput" autoFocus defaultValue={item}
                          onBlur={e=>updateItem(activeCat,idx,e.target.value)}
                          onKeyDown={e=>{if(e.key==='Enter')updateItem(activeCat,idx,e.target.value);if(e.key==='Escape')setEditingItem(null);}}
                          style={{flex:1}} />
                      ) : (
                        <>
                          <span style={{flex:1,fontFamily:"'DM Mono',monospace",fontSize:'.88rem',fontWeight:300,color:'var(--chalk)'}}>{item}</span>
                          <div style={{display:'flex',gap:4,alignItems:'center',flexShrink:0}}>
                            {isOwned && <span style={{fontSize:'.7rem',color:'#6a9a6a',letterSpacing:'.06em'}}>stocked</span>}
                            {uses > 0 && <span style={{fontSize:'.7rem',color:'#b8a98a',letterSpacing:'.06em'}}>{uses}✦</span>}
                            <button className="btn ghost sm" style={{padding:'4px 8px',fontSize:'.75rem'}}
                              onClick={()=>setEditingItem({cat:activeCat,idx,val:item})}>✏️</button>
                            <button className="btn ghost sm" style={{padding:'4px 8px',fontSize:'.75rem',color:'#c05050',borderColor:'#5a2020'}}
                              onClick={()=>deleteItem(activeCat,idx)}>✕</button>
                          </div>
                        </>
                      )}
                    </div>
                  );
                })}
                {draft[activeCat].length === 0 && (
                  <p className="muted-txt" style={{padding:'12px 0',textAlign:'center'}}>No items in this category yet.</p>
                )}
              </div>

              {/* Add item */}
              <div className="arow" style={{marginBottom:16}}>
                <input className="ainput" placeholder={`Add to ${activeCat}…`} value={newItemVal}
                  onChange={e=>setNewItemVal(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&addItem(activeCat)}
                  style={{flex:1}} />
                <button className="btn" onClick={()=>addItem(activeCat)} style={{flexShrink:0}}>Add</button>
              </div>
            </div>
          )}

          {/* Add new category */}
          <div style={{borderTop:'1px solid var(--slate-light)',paddingTop:14,marginBottom:16}}>
            <p className="lbl">New Category</p>
            <div className="arow">
              <input className="ainput" placeholder="Category name…" value={newCatVal}
                onChange={e=>setNewCatVal(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&addCategory()}
                style={{flex:1}} />
              <button className="btn ghost" onClick={addCategory} style={{flexShrink:0}}>+ Add</button>
            </div>
          </div>

          {/* Footer actions */}
          <div style={{borderTop:'1px solid var(--slate-light)',paddingTop:14,display:'flex',gap:8,flexWrap:'wrap'}}>
            <button className="btn" onClick={save} disabled={!dirty}>Save Changes</button>
            <button className="btn ghost" onClick={onClose}>Cancel</button>
            <button className="btn ghost sm" style={{marginLeft:'auto',color:'#b8a98a',fontSize:'.78rem'}}
              onClick={()=>setWarn({msg:'This will reset the master list to factory defaults. Your stocked items will be preserved where possible.', onConfirm:reset})}>
              Reset to Defaults
            </button>
          </div>

        </div>
      </div>
    </div>
  );
}

              <div style={{fontFamily:"'DM Mono',monospace",fontSize:'.82rem',fontWeight:500,marginBottom:2}}>Add as Alternate</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:'.76rem',fontWeight:300,color:'#b8a98a'}}>Save as "{existing.name} (Alternate)" — keep both</div>
            </button>
            <button className="btn ghost" onClick={onCancel} style={{textAlign:'left',padding:'12px 16px',borderColor:'var(--slate-light)'}}>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:'.82rem',fontWeight:500,marginBottom:2}}>Cancel</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:'.76rem',fontWeight:300,color:'#b8a98a'}}>Discard incoming, keep what you have</div>
            </button>
          </div>

        </div>
      </div>
    </div>
  );
}

function App() {
  const topRef = useRef(null);
  const [view, setView]       = useState('home');
  const [moreModal, setMore]  = useState(null);
  const [editModal, setEdit]  = useState(null);
  const [surpriseId, setSurprise] = useState(null);
  const [owned, setOwned]     = useState(() => ld('tdb_owned', DEFAULT_OWNED));
  const [catalog, setCatalog] = useState(() => ld('tdb_catalog', DEFAULT_CATALOG));
  const [favIds, setFavIds]   = useState(() => ld('tdb_favs', []));
  const [custom, setCustom]   = useState(() => ld('tdb_custom', []));
  const [cart, setCart]       = useState(() => ld('tdb_cart', []));
  const [hidden, setHidden]   = useState(() => ld('tdb_hidden', []));
  const [apiKey, setApiKey]   = useState(() => ld('tdb_apikey', ''));
  const [scanModal, setScan]  = useState(false);
  const [dupModal, setDup]    = useState(null); // {incoming, existing, source}

  useEffect(()=>{ sv('tdb_owned', owned);  }, [owned]);
  useEffect(()=>{ sv('tdb_favs',  favIds); }, [favIds]);
  useEffect(()=>{ sv('tdb_custom',custom); }, [custom]);
  useEffect(()=>{ sv('tdb_cart',  cart);   }, [cart]);
  useEffect(()=>{ sv('tdb_hidden',hidden); }, [hidden]);
  useEffect(()=>{ sv('tdb_apikey',apiKey); }, [apiKey]);
  useEffect(()=>{ sv('tdb_catalog',catalog); }, [catalog]);

  const set = mkSet(owned);
  const customIds = new Set(custom.map(c=>c.id));
  const hiddenSet = new Set(hidden);
  const all = [
    ...DB.filter(c=>!customIds.has(c.id)&&!hiddenSet.has(c.id)).map(c=>({...c, fav:favIds.includes(c.id)})),
    ...custom.map(c=>({...c, fav:favIds.includes(c.id)})),
  ];

  const onFav    = id   => setFavIds(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev,id]);
  const onCart   = item => setCart(prev => prev.includes(item) ? prev : [...prev,item]);
  const sortByName = arr => [...arr].sort((a,b)=>a.name.localeCompare(b.name));

  const fuzzyMatch = (a, b) => {
    const norm = s => s.toLowerCase().trim().replace(/[^a-z0-9]/g,' ').replace(/\s+/g,' ');
    const na = norm(a), nb = norm(b);
    if (na === nb) return 'exact';
    // Check if one contains the other or they share 80%+ of words
    const wa = new Set(na.split(' ')), wb = new Set(nb.split(' '));
    const shared = [...wa].filter(w=>w.length>2&&wb.has(w)).length;
    const maxWords = Math.max(wa.size, wb.size);
    if (shared / maxWords >= 0.75) return 'similar';
    return null;
  };

  const onImport = c => {
    // Check against DB recipes
    const dbMatch = DB.find(x => fuzzyMatch(x.name, c.name));
    // Check against custom recipes
    const customMatch = custom.find(x => fuzzyMatch(x.name, c.name));
    const existing = customMatch || dbMatch;

    if (existing) {
      const matchType = fuzzyMatch(existing.name, c.name);
      const source = customMatch ? 'your custom library' : 'the built-in database';
      setDup({ incoming: c, existing, source, matchType });
    } else {
      setCustom(prev => sortByName([...prev, c]));
    }
  };

  const onDupReplace = () => {
    if (!dupModal) return;
    const { incoming, existing } = dupModal;
    // Remove existing from custom if it's there, add new one with same id
    setCustom(prev => sortByName([
      ...prev.filter(x => x.id !== existing.id),
      { ...incoming, id: existing.id, isEdited: true }
    ]));
    // If it was a DB recipe being overridden, ensure it's not in hidden
    setHidden(prev => prev.filter(x => x !== existing.id));
    setDup(null);
  };

  const onDupAlternate = () => {
    if (!dupModal) return;
    const { incoming, existing } = dupModal;
    const altName = `${existing.name} (Alternate)`;
    const altRecipe = { ...incoming, id: `alt_${Date.now()}`, name: altName, isImported: true };
    setCustom(prev => sortByName([...prev, altRecipe]));
    setDup(null);
  };
  const onEdit   = c    => setEdit(c);
  const onDelete = c    => {
    // Custom/imported/edited: remove entirely
    if (custom.some(x=>x.id===c.id)) {
      setCustom(prev=>prev.filter(x=>x.id!==c.id));
    } else {
      // DB recipe: add to hidden list
      setHidden(prev=>[...prev, c.id]);
    }
    setFavIds(prev=>prev.filter(x=>x!==c.id));
  };
  const onSave   = updated => {
    // If it's a custom recipe, update in place; otherwise save as custom override
    if (custom.some(x=>x.id===updated.id)) {
      setCustom(prev=>prev.map(x=>x.id===updated.id?updated:x));
    } else {
      // Store as custom override with same id so it replaces DB entry
      setCustom(prev=>sortByName([...prev.filter(x=>x.id!==updated.id), {...updated, isEdited:true}]));
    }
  };

  const goHome = () => {
    setView('home');
    if (topRef.current) topRef.current.scrollIntoView({ behavior: 'smooth' });
    else window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const NAV = [
    { id:'home',      label:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg> },
    { id:'recipes',   label:'Recipes'   },
    { id:'inventory', label:'Inventory' },
    { id:'discover',  label:'Discover'  },
  ];

  const shared = { set, all, onFav, onMore:setMore, onCart, cart, onEdit, onDelete };

  return (
    <>
      <div ref={topRef} />
      <div className="shell">
        {/* ── Logo header — tapping always goes Home ── */}
        <header className="header" onClick={goHome} title="Home">
